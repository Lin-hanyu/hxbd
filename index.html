<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>核邪部队</title>
<style>
*{margin:0;padding:0}
body{background:#000;color:#0f0;font-family:'Courier New',monospace;overflow:hidden;width:100vw;height:100vh}
canvas{display:block;cursor:crosshair;touch-action:none}
#mainMenu{position:fixed;inset:0;z-index:1000;background:#000}
#mainMenu canvas{position:absolute;inset:0;width:100%;height:100%}
#menuBtns{position:absolute;left:50%;top:50%;transform:translate(-50%,20px);z-index:1001;display:flex;flex-direction:column;align-items:center;gap:12px}
#menuMain,#menuAi{display:flex;flex-direction:column;align-items:center;gap:12px}
.menu-btn{width:220px;padding:10px 20px;background:#1a1a00;border:2px solid #654321;
  color:#a0906a;cursor:pointer;font-family:'Courier New',monospace;font-size:15px;text-align:center;
  transition:background 0.15s,border-color 0.15s,color 0.15s}
.menu-btn:hover{background:#3a2a10;border-color:#c8a96e;color:#e8c87a}
.menu-btn:active{background:#2a2a10}
#gameUI{position:fixed;inset:0;display:none;background:#000}
#gameUI canvas{position:absolute;inset:0}
#uiOverlay{position:fixed;z-index:500;pointer-events:none}
#uiOverlay>*{pointer-events:auto}
#topBar{position:fixed;top:0;left:0;right:0;height:44px;z-index:600;
  background:#1a1a00;border-bottom:3px solid #654321;display:flex;align-items:center;
  font-family:'Courier New',monospace;font-size:14px;color:#c8a96e;padding:0 10px}
#topBar .t{color:#e8c87a;font-weight:bold;font-size:16px}
#topBar .s{color:#8a7a5a;margin:0 15px;font-size:13px}
#topBar .btn{padding:3px 10px;background:#2a2a00;border:2px solid #654321;
  color:#c8a96e;cursor:pointer;font-family:'Courier New';font-size:13px;margin-left:auto}
#topBar .btn:hover{background:#3a3a00;border-color:#8a6a41}
#toolPanel{position:fixed;top:44px;right:0;bottom:36px;width:170px;z-index:600;
  background:#1a1a00;border-left:3px solid #654321;overflow-y:auto;padding:6px}
#toolPanel .st{color:#8a7a5a;font-size:11px;padding:3px 0;border-bottom:1px solid #3a2a00;
  margin-top:6px;letter-spacing:1px}
.tb{display:block;width:100%;padding:5px 8px;margin:2px 0;
  background:#2a2a00;border:1px solid #3a2a00;color:#a0906a;cursor:pointer;
  font-family:'Courier New';font-size:12px;text-align:left;pointer-events:auto}
.tb:hover{background:#3a3a00;border-color:#654321;color:#c8a96e}
.tb.act{border-color:#c8a96e;color:#e8c87a;background:#2a2a10}
.tb.ht{display:none}
.tb.r{border-left:3px solid #c44}
.tb.b{border-left:3px solid #48f}
#bottomBar{position:fixed;bottom:0;left:0;right:0;height:36px;z-index:600;
  background:#1a1a00;border-top:3px solid #654321;display:flex;align-items:center;
  font-family:'Courier New';font-size:13px;color:#8a7a5a;padding:0 10px}
#turnInd{font-weight:bold;font-size:14px;margin-right:15px;white-space:nowrap}
#hintTxt{flex:1;text-align:center;color:#a0906a}
#startBtn{padding:2px 12px;background:#2a4a2a;border:2px solid #2a6a2a;
  color:#4a8a4a;cursor:pointer;font-family:'Courier New';font-size:13px;pointer-events:auto}
#startBtn:hover{background:#3a5a3a;border-color:#3a8a3a}
#unitPopup{position:fixed;display:none;z-index:2000;background:#1a1a00;
  border:2px solid #c8a96e;padding:8px;min-width:160px}
.pb{display:block;width:100%;padding:5px 8px;margin:2px 0;
  background:#2a2a00;border:1px solid #3a2a00;color:#a0906a;cursor:pointer;
  font-family:'Courier New';font-size:12px;text-align:left}
.pb:hover{background:#3a3a00;border-color:#c8a96e;color:#e8c87a}
#modal{position:fixed;inset:0;z-index:3000;display:none;background:rgba(0,0,0,0.8);
  align-items:center;justify-content:center}
#modal .box{background:#1a1a00;border:3px solid #654321;padding:30px;text-align:center;max-width:350px}
#modal h2{color:#e8c87a;font-size:22px;margin-bottom:10px}
#modal p{color:#8a7a5a;margin-bottom:20px;font-size:14px}
#modal button{padding:6px 24px;background:#3a2a00;border:2px solid #654321;
  color:#c8a96e;cursor:pointer;font-family:'Courier New';font-size:14px}
#modal button:hover{background:#4a3a00}
#cancelBtn{position:fixed;bottom:44px;right:4px;z-index:700;padding:6px 14px;
  background:#3a2a00;border:2px solid #654321;color:#c8a96e;cursor:pointer;
  font-family:'Courier New';font-size:13px;display:none}
#cancelBtn:hover{background:#4a3a00;border-color:#c8a96e}
#angleKnob{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:700;
  background:#1a1a00;border:2px solid #654321;padding:6px 14px;display:none;
  align-items:center;gap:8px;font-family:'Courier New',monospace}
#angleLabel{color:#c8a96e;font-size:12px;min-width:32px;text-align:center}
.knob-btn{padding:4px 10px;background:#2a2a00;border:1px solid #3a2a00;
  color:#a0906a;cursor:pointer;font-family:'Courier New';font-size:14px}
.knob-btn:hover{background:#3a3a00;border-color:#c8a96e;color:#e8c87a}
#knobDisplay{width:30px;height:30px;border-radius:50%;border:2px solid #654321;
  background:#2a2a00;position:relative;flex-shrink:0}
#knobIndicator{position:absolute;width:3px;height:12px;background:#c8a96e;
  left:50%;bottom:50%;transform-origin:50% 100%;border-radius:2px}

/* ===== 移动端适配 ===== */
/* 移动端底部工具面板（替代右侧 toolPanel） */
#mobileToolPanel{position:fixed;bottom:0;left:0;right:0;z-index:650;display:none;
  background:#1a1a00;border-top:3px solid #654321;max-height:45vh;overflow:hidden;
  flex-direction:column}
#mobileToolPanel .mtp-tabs{display:flex;flex-shrink:0;border-bottom:2px solid #3a2a00}
#mobileToolPanel .mtp-tab{flex:1;padding:8px 4px;text-align:center;font-family:'Courier New';
  font-size:12px;color:#8a7a5a;background:#1a1a00;border:none;border-right:1px solid #3a2a00;cursor:pointer}
#mobileToolPanel .mtp-tab.active{color:#e8c87a;background:#2a2a10;border-bottom:2px solid #c8a96e}
#mobileToolPanel .mtp-tab:last-child{border-right:none}
#mobileToolPanel .mtp-list{overflow-y:auto;padding:4px;display:flex;flex-wrap:wrap;gap:4px}
#mobileToolPanel .mtp-list .tb{width:calc(50% - 2px);padding:8px 6px;font-size:11px;margin:0;
  box-sizing:border-box;min-height:36px}
#mobileToolPanel .mtp-close{display:none;width:100%;padding:6px 0;text-align:center;
  background:#3a2a00;border:none;border-bottom:2px solid #654321;
  color:#c8a96e;cursor:pointer;font-family:'Courier New';font-size:13px;flex-shrink:0}

/* 移动端工具按钮（底栏中央，打开面板） */
#mobileToolBtn{display:none;position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:640;
  padding:6px 18px;background:#2a4a2a;border:2px solid #2a6a2a;color:#4a8a4a;cursor:pointer;
  font-family:'Courier New';font-size:13px;border-radius:4px}

/* 移动端开火确认按钮 */
#mobileFireBtn{display:none;position:fixed;bottom:80px;right:10px;z-index:700;
  padding:10px 20px;background:#5a2020;border:2px solid #c44;color:#faa;cursor:pointer;
  font-family:'Courier New';font-size:15px;border-radius:6px;font-weight:bold}

/* 响应式：小屏幕 */
@media(max-width:600px){
  #topBar{height:36px;font-size:12px;padding:0 6px}
  #topBar .t{font-size:14px}
  #topBar .s{margin:0 6px;font-size:11px}
  #topBar .btn{padding:2px 8px;font-size:11px}
  #bottomBar{height:32px;font-size:11px;padding:0 6px}
  #turnInd{font-size:12px;margin-right:8px}
  #hintTxt{font-size:11px}
  #cancelBtn{bottom:38px;right:2px;padding:5px 10px;font-size:12px}
  #angleKnob{bottom:76px;padding:4px 10px}
  #angleLabel{font-size:11px}
  .knob-btn{padding:6px 14px;font-size:16px}
  #knobDisplay{width:36px;height:36px}
  #knobIndicator{height:14px}
  #mobileToolBtn{display:block}
  #mobileFireBtn{padding:12px 24px;font-size:16px}
  #unitPopup{min-width:140px;padding:6px}
  #unitPopup .pb{padding:8px 6px;font-size:12px;min-height:36px}
  #modal .box{padding:20px;max-width:90vw}
  #modal h2{font-size:18px}
  #modal p{font-size:12px}
}
/* 极小屏幕 */
@media(max-width:380px){
  #topBar .s{display:none}
  #topBar .t{font-size:13px}
}
</style></head><body>

<div id="mainMenu">
  <canvas id="menuCanvas"></canvas>
  <div id="menuBtns">
    <div id="menuMain">
      <button class="menu-btn" onclick="G={aiMode:false};showGame();">⚔ 战术模式</button>
      <button class="menu-btn" onclick="showModal('🚧 开发中','大战场模式正在紧张开发中，敬请期待！')">🏴 大战场模式</button>
      <button class="menu-btn" onclick="document.getElementById('menuMain').style.display='none';document.getElementById('menuAi').style.display='flex';">🤖 AI对战</button>
    </div>
    <div id="menuAi" style="display:none">
      <button class="menu-btn" onclick="G={aiMode:true};showGame();">⚔ 战术模式</button>
      <button class="menu-btn" onclick="showModal('🚧 开发中','AI大战场模式正在开发中，敬请期待！')">🏴 大战场模式</button>
      <button class="menu-btn" onclick="document.getElementById('menuMain').style.display='flex';document.getElementById('menuAi').style.display='none';">← 返回</button>
    </div>
  </div>
</div>

<div id="gameUI">
  <canvas id="gameCanvas"></canvas>
  <div id="topBar">
    <span class="t">核邪部队</span><span class="s">战术模式</span>
    <span style="color:#8a7a5a;font-size:13px" id="topInfo">回合:- 阶段:-</span>
    <span style="margin:0 10px;color:#c44" id="hpR">红营:-</span>
    <span style="color:#48f" id="hpB">蓝营:-</span>
    <span id="aiBadge" style="display:none;color:#0f0;font-weight:bold;margin-right:10px">🤖 AI</span>
    <button class="btn" onclick="backToMenu()">返回</button>
  </div>
  <div id="toolPanel">
    <div class="st" id="drawST">绘制地图</div>
    <button class="tb draw-tool" data-tool="shelter" onclick="selTool('shelter')">■ 掩体 [无限]</button>
    <button class="tb draw-tool" data-tool="camp_red" onclick="selTool('camp_red')">■ 营地(红) [5HP]</button>
    <button class="tb draw-tool" data-tool="camp_blue" onclick="selTool('camp_blue')">■ 营地(蓝) [5HP]</button>
    <div class="st">部署兵种</div>
    <button class="tb unit-tool r" data-tool="soldier_r" onclick="selTool('soldier_r')">○ 普通兵 [3HP/1AT]</button>
    <button class="tb unit-tool b" data-tool="soldier_b" onclick="selTool('soldier_b')">○ 普通兵 [3HP/1AT]</button>
    <button class="tb unit-tool r" data-tool="sniper_r" onclick="selTool('sniper_r')">● 狙击兵 [1HP/2AT]</button>
    <button class="tb unit-tool b" data-tool="sniper_b" onclick="selTool('sniper_b')">● 狙击兵 [1HP/2AT]</button>
    <button class="tb unit-tool r" data-tool="engineer_r" onclick="selTool('engineer_r')">⊤ 工程兵 [1HP]</button>
    <button class="tb unit-tool b" data-tool="engineer_b" onclick="selTool('engineer_b')">⊤ 工程兵 [1HP]</button>
    <button class="tb unit-tool r" data-tool="mortar_r" onclick="selTool('mortar_r')">/\ 迫击炮 [1HP]</button>
    <button class="tb unit-tool b" data-tool="mortar_b" onclick="selTool('mortar_b')">/\ 迫击炮 [1HP]</button>
    <button class="tb unit-tool r" data-tool="interceptor_r" onclick="selTool('interceptor_r')">][ 拦截装置 [1HP]</button>
    <button class="tb unit-tool b" data-tool="interceptor_b" onclick="selTool('interceptor_b')">][ 拦截装置 [1HP]</button>
  </div>
  <div id="bottomBar">
    <span id="turnInd">准备中...</span>
    <span id="hintTxt">点击地图放置或选择单位</span>
    <button id="startBtn" onclick="startGame()">开始游戏</button>
  </div>
</div>

<div id="unitPopup"></div>
<div id="modal"><div class="box" id="modalBox"></div></div>

<!-- 取消按钮（代替T键） -->
<button id="cancelBtn" onclick="doCancel()">✕ 取消</button>
<!-- 角度旋钮 -->
<div id="angleKnob" style="display:none">
  <div id="angleLabel">0°</div>
  <button class="knob-btn" onclick="adjAngle(-0.26)">↺</button>
  <div id="knobDisplay"><div id="knobIndicator"></div></div>
  <button class="knob-btn" onclick="adjAngle(0.26)">↻</button>
</div>

<!-- 移动端工具按钮（打开底部面板） -->
<button id="mobileToolBtn" onclick="toggleMobilePanel()">☰ 工具</button>

<!-- 移动端开火按钮 -->
<button id="mobileFireBtn" onclick="mobileFire()">🔥 开火</button>

<!-- 移动端底部工具面板 -->
<div id="mobileToolPanel">
  <button class="mtp-close" onclick="toggleMobilePanel()">▼ 收起工具栏</button>
  <div class="mtp-tabs">
    <button class="mtp-tab active" data-mtab="draw" onclick="switchMtpTab('draw')">地图</button>
    <button class="mtp-tab" data-mtab="red" onclick="switchMtpTab('red')">红方</button>
    <button class="mtp-tab" data-mtab="blue" onclick="switchMtpTab('blue')">蓝方</button>
  </div>
  <div class="mtp-list" id="mtpList"></div>
</div>

<script>
// ===== 图片加载系统 =====
const IMG_CACHE = {};
const IMG_LIST = {
  // 营地
  'camp_red': '元素/营地/红/营地红.png',
  'camp_blue': '元素/营地/蓝/营地蓝.png',
  // 墙
  'wall_red': '元素/墙/红/墙红.png',
  'wall_blue': '元素/墙/蓝/墙蓝.png',
  'wall_black': '元素/墙/黑/墙黑.png',
  // 普通兵
  'soldier_red': '元素/普通兵/红/普通兵红.png',
  'soldier_red_1': '元素/普通兵/红/普通兵红开一枪.png',
  'soldier_red_2': '元素/普通兵/红/普通兵红开两枪.png',
  'soldier_red_3': '元素/普通兵/红/普通兵红开三枪.png',
  'soldier_red_4': '元素/普通兵/红/普通兵红开四枪.png',
  'soldier_red_5': '元素/普通兵/红/普通兵红开五枪.png',
  'soldier_blue': '元素/普通兵/蓝/普通兵蓝.png',
  'soldier_blue_1': '元素/普通兵/蓝/普通兵蓝开一枪.png',
  'soldier_blue_2': '元素/普通兵/蓝/普通兵蓝开两枪.png',
  'soldier_blue_3': '元素/普通兵/蓝/普通兵蓝开三枪.png',
  'soldier_blue_4': '元素/普通兵/蓝/普通兵蓝开四枪.png',
  'soldier_blue_5': '元素/普通兵/蓝/普通兵蓝开五枪.png',
  // 狙击兵
  'sniper_red': '元素/狙击兵/红/狙击兵红.png',
  'sniper_red_1': '元素/狙击兵/红/狙击兵红开一枪.png',
  'sniper_red_2': '元素/狙击兵/红/狙击兵红开两枪.png',
  'sniper_blue': '元素/狙击兵/蓝/狙击兵蓝.png',
  'sniper_blue_1': '元素/狙击兵/蓝/狙击兵蓝开一枪.png',
  'sniper_blue_2': '元素/狙击兵/蓝/狙击兵蓝开两枪.png',
  // 拦截装置
  'interceptor_red': '元素/拦截装置/红/拦截装置红.png',
  'interceptor_red_1': '元素/拦截装置/红/拦截装置红上一发拦截弹.png',
  'interceptor_red_2': '元素/拦截装置/红/拦截装置红上两发拦截弹.png',
  'interceptor_red_3': '元素/拦截装置/红/拦截装置红上三发拦截弹.png',
  'interceptor_blue': '元素/拦截装置/蓝/拦截装置蓝.png',
  'interceptor_blue_1': '元素/拦截装置/蓝/拦截装置蓝上一发拦截弹.png',
  'interceptor_blue_2': '元素/拦截装置/蓝/拦截装置蓝上两发拦截弹.png',
  'interceptor_blue_3': '元素/拦截装置/蓝/拦截装置蓝上三发拦截弹.png',
  // 工程兵
  'engineer_red': '元素/工程兵/红/工程兵红.png',
  'engineer_red_1': '元素/工程兵/红/工程兵红填充一个混泥土.png',
  'engineer_red_2': '元素/工程兵/红/工程兵红填充两个混泥土.png',
  'engineer_red_3': '元素/工程兵/红/工程兵红填充三个混泥土.png',
  'engineer_blue': '元素/工程兵/蓝/工程兵蓝.png',
  'engineer_blue_1': '元素/工程兵/蓝/工程兵蓝填充一个混泥土.png',
  'engineer_blue_2': '元素/工程兵/蓝/工程兵蓝填充两个混泥土.png',
  'engineer_blue_3': '元素/工程兵/蓝/工程兵蓝填充三个混泥土.png',
  // 迫击炮
  'mortar_red': '元素/迫击炮/红/迫击炮红.png',
  'mortar_red_1': '元素/迫击炮/红/迫击炮红上一枚炮弹.png',
  'mortar_red_2': '元素/迫击炮/红/迫击炮红上两枚炮弹.png',
  'mortar_red_3': '元素/迫击炮/红/迫击炮红上三枚炮弹.png',
  'mortar_red_4': '元素/迫击炮/红/迫击炮红上四枚炮弹.png',
  'mortar_blue': '元素/迫击炮/蓝/迫击炮蓝.png',
  'mortar_blue_1': '元素/迫击炮/蓝/迫击炮蓝上一枚炮弹.png',
  'mortar_blue_2': '元素/迫击炮/蓝/迫击炮蓝上两枚炮弹.png',
  'mortar_blue_3': '元素/迫击炮/蓝/迫击炮蓝上三枚炮弹.png',
  'mortar_blue_4': '元素/迫击炮/蓝/迫击炮蓝上四枚炮弹.png',
};

function loadImages() {
  let loaded = 0;
  const total = Object.keys(IMG_LIST).length;
  return new Promise((resolve) => {
    for (const [key, path] of Object.entries(IMG_LIST)) {
      const img = new Image();
      img.onload = () => { loaded++; if (loaded >= total) resolve(); };
      img.onerror = () => { loaded++; if (loaded >= total) resolve(); };
      img.src = path;
      IMG_CACHE[key] = img;
    }
  });
}

function getImg(key) {
  return IMG_CACHE[key] || null;
}

// 获取单位对应的图片key
function getUnitImgKey(u) {
  const t = u.team === 'red' ? 'red' : 'blue';
  if (u.type === 'soldier') {
    const fired = u.bulletsFired || 0;
    if (fired > 0) return `soldier_${t}_${fired}`;
    return `soldier_${t}`;
  }
  if (u.type === 'sniper') {
    const fired = u.bulletsFired || 0;
    if (fired > 0) return `sniper_${t}_${fired}`;
    return `sniper_${t}`;
  }
  if (u.type === 'mortar') {
    const ammo = Math.min(u.ammo || 0, 4);
    if (ammo > 0) return `mortar_${t}_${ammo}`;
    return `mortar_${t}`;
  }
  if (u.type === 'engineer') {
    const c = u.reservedCement || 0;
    if (c > 0) return `engineer_${t}_${Math.min(c,3)}`;
    return `engineer_${t}`;
  }
  if (u.type === 'interceptor') {
    const a = u.interceptAmmo || 0;
    if (a > 0) return `interceptor_${t}_${Math.min(a,3)}`;
    return `interceptor_${t}`;
  }
  if (u.type === 'wall') return u.team === 'red' ? 'wall_red' : 'wall_blue';
  return null;
}

// 绘制图片（带旋转和缩放）
function drawImg(ctx, key, x, y, angle, scale) {
  const img = getImg(key);
  if (!img || !img.complete || img.naturalWidth === 0) return false;
  // 营地用大一点的比例
  const defaultScale = key.startsWith('camp') ? 0.22 : (key.startsWith('wall') ? 0.22 : 0.14);
  const s = scale || defaultScale;
  const w = img.naturalWidth * s;
  const h = img.naturalHeight * s;
  ctx.save();
  ctx.translate(x, y);
  // 普通兵/狙击兵根据朝向旋转图片（图片枪口默认朝右，所以加 Math.PI/2）
  // 迫击炮的图片本身就有角度，不额外旋转
  // 墙/掩体根据角度旋转
  if (angle !== undefined && angle !== null) {
    if (key.startsWith('soldier') || key.startsWith('sniper')) {
      ctx.rotate(angle);
    } else if (key.startsWith('wall')) {
      ctx.rotate(angle - Math.PI/2);
    }
  }
  ctx.drawImage(img, -w / 2, -h / 2, w, h);
  ctx.restore();
  return true;
}

// ===== 常量 =====
const MS=800,UR=12,CS=22,CM=70,SW=85,SH=20;
const SD='draw',ST='truce',SB='battle';
let G=null;
const MC=document.getElementById('menuCanvas'),MCC=MC.getContext('2d');
const GC=document.getElementById('gameCanvas'),GCC=GC.getContext('2d');
GC.width=GC.height=MS;
MC.width=window.innerWidth;MC.height=window.innerHeight;

// ===== 复古沙土地图纹理 =====
function genSandTexture(w,h){
  const c=document.createElement('canvas');c.width=w;c.height=h;
  const cx=c.getContext('2d');
  const id=cx.createImageData(w,h);
  for(let i=0;i<id.data.length;i+=4){
    const b=100+Math.random()*30|0;
    id.data[i]=b+15;id.data[i+1]=b+5;id.data[i+2]=b-10;id.data[i+3]=255;
  }
  cx.putImageData(id,0,0);
  // 一些深色斑点模拟沙砾
  for(let i=0;i<300;i++){
    const x=Math.random()*w,y=Math.random()*h;
    const g=80+Math.random()*25|0;
    cx.fillStyle=`rgb(${g},${g-5},${g-15})`;
    cx.fillRect(x,y,1+Math.random()*2|0,1+Math.random()*2|0);
  }
  return c;
}
const SAND=genSandTexture(MS,MS);

function drawDesertBG(ctx,w,h){
  ctx.drawImage(SAND,0,0,w,h);
  // 淡绿色网格
  ctx.strokeStyle='rgba(60,80,40,0.15)';ctx.lineWidth=0.5;
  for(let i=0;i<=w;i+=50){
    ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,h);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(w,i);ctx.stroke();
  }
}

function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2)}
function inR(a,b){return dist(a,b)<=CM*3}

// ===== 菜单界面 =====
function drawMenu(){

  MCC.fillStyle='#c8a96e';MCC.font='bold 64px "Courier New",monospace';

// 不再需要 mousemove/click 事件（按钮改为 HTML）

// ===== 游戏初始化 =====
function showGame(){
  const aiMode=G&&G.aiMode?true:false;
  loadImages().then(() => {
    document.getElementById('mainMenu').style.display='none';
    document.getElementById('gameUI').style.display='block';
    GC.width=MS;GC.height=MS;
    initGame(aiMode);
  });
}

function initGame(aiMode){
  G={
    state:SD,turn:0,phase:'red',step:0,maxStep:1,
    units:[],camps:{red:null,blue:null},shelters:[],
    selU:null,selT:null,buildWall:false,builder:null,
    selMortar:false,aimMode:false,
    sa:0,pa:0,mx:0,my:0,over:false,

  };

function resizeCanvas(){
  const isSmall=window.innerWidth<600;
  const panelW=0; // 面板改为底部抽屉，不占侧边
  const topH=isSmall?36:44;
  const botH=isSmall?32:36;
  const tw=window.innerWidth-panelW,th=window.innerHeight-topH-botH;
  const s=Math.min(tw,th,MS);
  GC.style.width=s+'px';GC.style.height=s+'px';
  GC.style.position='absolute';
  GC.style.left=((tw+panelW-s)/2)+'px';
  GC.style.top=((th+topH-botH+topH+botH-s)/2)+'px';
  // 精确居中
  GC.style.left=((window.innerWidth-s)/2)+'px';
  GC.style.top=(topH+(th-s)/2)+'px';
  // 侧边面板仅桌面端显示
  document.getElementById('toolPanel').style.display=isSmall?'none':'block';
  // 移动端工具按钮由 CSS media query 控制显示，无需 JS 设置
}

window.addEventListener('resize',()=>{if(G)resizeCanvas();if(!G)drawMenu();});

// ===== 绘制 =====
function draw(){
  if(!G)return;
  GCC.clearRect(0,0,MS,MS);
  drawDesertBG(GCC,MS,MS);
  drawShelters();
  drawCamps();
  drawUnits();
  drawWalls();
  drawSel();
  drawAnglePrev();
  drawPlacePrev();
  drawTrap();
  drawMortarPrev();
}

function drawShelters(){
  for(const s of G.shelters||[]){
    // 地图掩体用墙黑.png
    if(!drawImg(GCC, 'wall_black', s.x+SW/2, s.y+SH/2, s.angle||0)){
      // fallback
      GCC.save();
      GCC.translate(s.x+SW/2,s.y+SH/2);
      GCC.rotate((s.angle||0) - Math.PI/2);
      GCC.fillStyle='#5a4a30';GCC.strokeStyle='#7a6a4a';GCC.lineWidth=2;
      rRect(GCC,-SW/2,-SH/2,SW,SH,3);GCC.fill();GCC.stroke();
      GCC.fillStyle='#4a3a20';
      for(let i=-SW/2+4;i<SW/2-4;i+=10)GCC.fillRect(i,-SH/2+3,6,SH-6);
      GCC.restore();
    }
  }
}

function drawCamps(){
  if(!G||!G.camps)return;
  for(const t of['red','blue']){
    const c=G.camps[t];if(!c)continue;
    const cx=c.x,cy=c.y;
    const key=t==='red'?'camp_red':'camp_blue';
    if(!drawImg(GCC,key,cx,cy,0)){
      // fallback
      GCC.save();
      GCC.fillStyle=t==='red'?'#5a2020':'#20305a';
      GCC.strokeStyle=t==='red'?'#a44':'#48f';GCC.lineWidth=2;
      GCC.fillRect(cx-CS,cy-CS+5,CS*2,CS*2-5);
      GCC.strokeRect(cx-CS,cy-CS+5,CS*2,CS*2-5);
      GCC.beginPath();
      GCC.moveTo(cx-CS-5,cy-CS+5);GCC.lineTo(cx,cy-CS-8);GCC.lineTo(cx+CS+5,cy-CS+5);
      GCC.closePath();
      GCC.fillStyle=t==='red'?'#8a3030':'#304a8a';GCC.fill();GCC.stroke();
      GCC.restore();
    }
    GCC.fillStyle='#fff';GCC.font='bold 14px "Courier New"';
    GCC.textAlign='center';GCC.textBaseline='middle';
    GCC.fillText(`HP${c.hp}`,cx,cy+CS+12);
  }
}

function drawUnits(){
  for(const u of G.units){
    if(u.eliminated||u.trapped)continue;
    const r=u.team==='red',c=r?'#c44':'#48f';
    GCC.save();GCC.translate(u.x,u.y);
    if(G.selU===u){
      GCC.strokeStyle='#c8a96e';GCC.lineWidth=1.5;GCC.setLineDash([3,3]);
      GCC.beginPath();GCC.arc(0,0,UR+5,0,Math.PI*2);GCC.stroke();GCC.setLineDash([]);
    }
    // 尝试用图片绘制
    const imgKey = getUnitImgKey(u);
    if (imgKey && drawImg(GCC, imgKey, 0, 0, u.facing)) {
      // 图片绘制成功，绘制额外信息
      if (u.type === 'engineer' && u.reservedCement > 0) {
        GCC.fillStyle='#da0';GCC.font='9px "Courier New"';GCC.textAlign='center';GCC.textBaseline='middle';
        GCC.fillText(`C${u.reservedCement}`,0,UR+8);
      }
      if (u.type === 'interceptor') {
        const p=u.interceptAmmo>=2?100:(u.interceptAmmo===1?50:0);
        GCC.fillStyle=p>=100?'#0f0':(p>=50?'#aa0':'#555');
        GCC.font='8px "Courier New"';GCC.textAlign='center';GCC.textBaseline='middle';
        GCC.fillText(`${p}%`,0,-UR-18);
      }
      // 血量数字
    } else {
      // fallback: 代码绘制
      switch(u.type){
        case'soldier':dSoldier(u,c);break;
        case'sniper':dSniper(u,c);break;
        case'engineer':dEngineer(u,c);break;
        case'mortar':dMortar(u,c);break;
        case'interceptor':dInterceptor(u,c);break;
      }
    }
    // 血量数字
    if (u.type !== 'wall' && u.type !== 'mortar' && u.type !== 'interceptor') {
      GCC.fillStyle='#fff';GCC.font='bold 8px "Courier New"';
      GCC.textAlign='center';GCC.textBaseline='middle';
      GCC.fillText(`${u.hp}`,0,UR+10);
    }
    GCC.restore();
  }
  for(const u of G.units){
    if(u.eliminated||!u.trapped)continue;
    const r=u.team==='red',c=r?'#c44':'#48f';
    GCC.save();GCC.globalAlpha=0.4;GCC.translate(u.x,u.y);
    const imgKey = getUnitImgKey(u);
    if (imgKey && getImg(imgKey) && getImg(imgKey).complete) {
      drawImg(GCC, imgKey, 0, 0, u.facing);
    } else {
      switch(u.type){case'soldier':dSoldier(u,c);break;case'sniper':dSniper(u,c);break;case'engineer':dEngineer(u,c);break;}
    }
    GCC.restore();
  }
}

// 兵种绘制（与描述完全一致）
function dSoldier(u,c){
  const a=u.facing,da=a-Math.PI/2;
  GCC.strokeStyle=c;GCC.lineWidth=2.5;
  GCC.beginPath();GCC.arc(0,0,UR,0,Math.PI*2);GCC.stroke();
  // 血量
  if(u.hp<=2){
    GCC.strokeStyle=c;GCC.lineWidth=2;
    GCC.beginPath();GCC.moveTo(-4,-4);GCC.lineTo(4,4);GCC.stroke();
    if(u.hp<=1){GCC.beginPath();GCC.moveTo(-4,4);GCC.lineTo(4,-4);GCC.stroke();}
  }
  // 竖线
  GCC.strokeStyle=c;GCC.lineWidth=2.5;
  GCC.beginPath();GCC.moveTo(0,0);GCC.lineTo(Math.cos(da)*(UR+7),Math.sin(da)*(UR+7));GCC.stroke();
  // 小直角
  const gx=Math.cos(da)*(UR+7),gy=Math.sin(da)*(UR+7);
  const px=Math.cos(da+Math.PI/2),py=Math.sin(da+Math.PI/2);
  GCC.beginPath();GCC.moveTo(gx,gy);GCC.lineTo(gx+px*4,gy+py*4);GCC.stroke();
  GCC.beginPath();GCC.moveTo(gx+px*4,gy+py*4);GCC.lineTo(gx+px*4-Math.cos(da)*3,gy+py*4-Math.sin(da)*3);GCC.stroke();
  dBullets(u,UR,da,c);
}

function dSniper(u,c){
  const a=u.facing,da=a-Math.PI/2;
  GCC.fillStyle=c;GCC.beginPath();GCC.arc(0,0,UR,0,Math.PI*2);GCC.fill();
  if(u.hp<=0){
    GCC.strokeStyle='#fff';GCC.lineWidth=2;
    GCC.beginPath();GCC.moveTo(-4,-4);GCC.lineTo(4,4);GCC.stroke();
    GCC.beginPath();GCC.moveTo(-4,4);GCC.lineTo(4,-4);GCC.stroke();
  }
  GCC.strokeStyle='#fff';GCC.lineWidth=2.5;
  GCC.beginPath();GCC.moveTo(0,0);GCC.lineTo(Math.cos(da)*(UR+7),Math.sin(da)*(UR+7));GCC.stroke();
  const gx=Math.cos(da)*(UR+7),gy=Math.sin(da)*(UR+7);
  const px=Math.cos(da+Math.PI/2),py=Math.sin(da+Math.PI/2);
  GCC.beginPath();GCC.moveTo(gx,gy);GCC.lineTo(gx+px*4,gy+py*4);GCC.stroke();
  GCC.beginPath();GCC.moveTo(gx+px*4,gy+py*4);GCC.lineTo(gx+px*4-Math.cos(da)*3,gy+py*4-Math.sin(da)*3);GCC.stroke();
  dBullets(u,UR,da,'#fff');
}

function dEngineer(u,c){
  GCC.strokeStyle=c;GCC.lineWidth=3.5;GCC.lineCap='round';
  GCC.beginPath();GCC.moveTo(0,-UR+2);GCC.lineTo(0,UR-2);GCC.stroke();
  GCC.beginPath();GCC.moveTo(-UR+2,-UR+2);GCC.lineTo(UR-2,-UR+2);GCC.stroke();
  GCC.lineCap='butt';
  if(u.reservedCement>0){
    GCC.fillStyle='#da0';GCC.font='9px "Courier New"';GCC.textAlign='center';GCC.textBaseline='middle';
    GCC.fillText(`C${u.reservedCement}`,0,UR+8);
  }
}

function dMortar(u,c){
  const a=(u.facing||-Math.PI/3)-Math.PI/2;
  GCC.fillStyle='#4a4a30';GCC.strokeStyle='#7a6a4a';GCC.lineWidth=2;
  GCC.beginPath();GCC.arc(0,0,UR-1,0,Math.PI*2);GCC.fill();GCC.stroke();
  GCC.strokeStyle='#6a6a4a';GCC.lineWidth=2.5;
  GCC.beginPath();GCC.moveTo(-5,0);GCC.lineTo(0,-UR+2);GCC.lineTo(5,0);GCC.stroke();
  GCC.strokeStyle='#5a5a3a';GCC.lineWidth=4;GCC.lineCap='round';
  GCC.beginPath();GCC.moveTo(0,0);GCC.lineTo(Math.cos(a)*(UR+16),Math.sin(a)*(UR+16));GCC.stroke();
  GCC.lineCap='butt';
  GCC.strokeStyle='#8a8a6a';GCC.lineWidth=2;
  GCC.beginPath();GCC.arc(Math.cos(a)*(UR+15),Math.sin(a)*(UR+15),3.5,0,Math.PI*2);GCC.stroke();
  for(let i=0;i<Math.min(u.ammo,3);i++){
    const ox=Math.cos(a)*(UR+20+i*4.5),oy=Math.sin(a)*(UR+20+i*4.5);
    GCC.fillStyle='#333';GCC.strokeStyle='#666';GCC.lineWidth=1;
    GCC.beginPath();GCC.arc(ox,oy,3,0,Math.PI*2);GCC.fill();GCC.stroke();
  }
}

function dInterceptor(u,c){
  const r=u.team==='red';
  GCC.fillStyle=r?'#4a2020':'#202a4a';GCC.strokeStyle=c;GCC.lineWidth=2;
  GCC.beginPath();GCC.arc(0,0,UR-1,0,Math.PI*2);GCC.fill();GCC.stroke();
  GCC.strokeStyle='#6a6a4a';GCC.lineWidth=2;
  GCC.beginPath();GCC.moveTo(0,-UR);GCC.lineTo(0,-UR-12);GCC.stroke();
  GCC.strokeStyle='#0a0';GCC.lineWidth=2;
  GCC.beginPath();GCC.arc(0,-UR-12,6,-Math.PI*0.7,Math.PI*0.7);GCC.stroke();
  for(let i=0;i<Math.min(u.interceptAmmo,4);i++){
    GCC.fillStyle='#0a0';GCC.strokeStyle='#080';GCC.lineWidth=1;
    GCC.beginPath();GCC.arc(-7+i*4.5,UR+5,2.5,0,Math.PI*2);GCC.fill();GCC.stroke();
  }
  const p=u.interceptAmmo>=2?100:(u.interceptAmmo===1?50:0);
  GCC.fillStyle=p>=100?'#0f0':(p>=50?'#aa0':'#555');
  GCC.font='8px "Courier New"';GCC.textAlign='center';GCC.textBaseline='middle';
  GCC.fillText(`${p}%`,0,-UR-18);
}

function dBullets(u,r,a,c){
  const f=u.bulletsFired||0;if(!f)return;
  const ra=a+Math.PI/2;GCC.strokeStyle=c;GCC.lineWidth=1.5;
  for(let i=0;i<f;i++){
    const o=(i+1)*3;
    const sx=Math.cos(a)*(r+1)+Math.cos(ra)*o,sy=Math.sin(a)*(r+1)+Math.sin(ra)*o;
    GCC.beginPath();GCC.moveTo(sx,sy);GCC.lineTo(sx+Math.cos(a)*4,sy+Math.sin(a)*4);GCC.stroke();
  }
}

function drawWalls(){
  for(const u of G.units){
    if(u.type!=='wall'||u.eliminated)continue;
    const key = u.team === 'red' ? 'wall_red' : (u.team === 'blue' ? 'wall_blue' : 'wall_black');
    if(!drawImg(GCC, key, u.x, u.y, u.facing || 0)){
      // fallback - 也应用角度旋转（0°=朝上）
      GCC.save();GCC.translate(u.x,u.y);GCC.rotate((u.facing||0) - Math.PI/2);
      const wc=u.color||'#6a5a40';
      GCC.fillStyle=wc;GCC.strokeStyle='#aaa';GCC.lineWidth=1.5;
      const w=u.w||50,h=u.h||6;
      rRect(GCC,-w/2,-h/2,w,h,2);GCC.fill();GCC.stroke();
      GCC.restore();
    }
    GCC.fillStyle='#fff';GCC.font='8px "Courier New"';GCC.textAlign='center';GCC.textBaseline='middle';
    GCC.fillText(u.maxHp>99?'∞':`H${u.hp}`,u.x,u.y-(u.h||6)/2-4);
  }
}

function drawSel(){
  const u=G.selU;if(!u||u.eliminated)return;
  GCC.save();
  GCC.strokeStyle='rgba(200,169,110,0.4)';GCC.lineWidth=1.5;GCC.setLineDash([4,4]);
  GCC.beginPath();GCC.arc(u.x,u.y,CM*3,0,Math.PI*2);GCC.stroke();GCC.setLineDash([]);
  GCC.restore();
}

function drawAnglePrev(){
  const u=G.selU;
  if(!u||u.eliminated||!G.aimMode)return;
  const rg=Math.PI/4,fa=u.facing-Math.PI/2;
  GCC.save();
  GCC.fillStyle='rgba(200,169,110,0.08)';GCC.strokeStyle='rgba(200,169,110,0.3)';GCC.lineWidth=1;
  GCC.beginPath();GCC.moveTo(u.x,u.y);GCC.arc(u.x,u.y,600,fa-rg,fa+rg);GCC.closePath();GCC.fill();GCC.stroke();
  const dx=G.mx-u.x,dy=G.my-u.y,ma=Math.atan2(dy,dx);
  let df=ma-fa;while(df>Math.PI)df-=Math.PI*2;while(df<-Math.PI)df+=Math.PI*2;
  if(Math.abs(df)<=rg){
    GCC.strokeStyle='rgba(200,50,50,0.6)';GCC.lineWidth=1.5;GCC.setLineDash([5,4]);
    GCC.beginPath();GCC.moveTo(u.x,u.y);GCC.lineTo(G.mx,G.my);GCC.stroke();GCC.setLineDash([]);
    GCC.fillStyle='#c44';GCC.font='11px "Courier New"';GCC.textAlign='center';GCC.textBaseline='middle';
    GCC.fillText('射击',G.mx,G.my-8);
  }else{
    GCC.fillStyle='rgba(200,50,50,0.3)';GCC.font='10px "Courier New"';GCC.textAlign='center';GCC.textBaseline='middle';
    GCC.fillText('超出范围',G.mx,G.my-8);
  }
  GCC.restore();
}

function drawPlacePrev(){
  // 工程兵建造掩体预览
  if(G.buildWall&&G.builder&&!G.builder.eliminated){
    const mx=G.mx,my=G.my;
    if(mx>=0&&mx<=MS&&my>=0&&my<=MS){
      const a=G.pa||0;
      GCC.save();GCC.globalAlpha=0.35;
      const key=G.builder.team==='red'?'wall_red':'wall_blue';
      if(!drawImg(GCC,key,mx,my,a)){
        GCC.save();GCC.translate(mx,my);GCC.rotate(a - Math.PI/2);
        GCC.fillStyle='#6a5a40';GCC.strokeStyle='#aaa';GCC.lineWidth=1.5;
        rRect(GCC,-25,-3,50,6,2);GCC.fill();GCC.stroke();
        GCC.restore();
      }
      GCC.fillStyle='rgba(200,169,110,0.5)';GCC.font='10px "Courier New"';GCC.textAlign='center';GCC.textBaseline='middle';
      GCC.fillText(`角度 ${Math.round(a*180/Math.PI)}°`,mx,my-16);
      // 范围圈
      GCC.strokeStyle='rgba(200,169,110,0.15)';GCC.setLineDash([3,3]);
      GCC.beginPath();GCC.arc(G.builder.x,G.builder.y,CM*3,0,Math.PI*2);GCC.stroke();GCC.setLineDash([]);
      GCC.restore();
    }
    return;
  }
  if(!G.selT)return;
  const t=G.selT,mx=G.mx,my=G.my;
  if(mx<0||mx>MS||my<0||my>MS)return;
  GCC.save();GCC.globalAlpha=0.35;
  if(t.startsWith('shelter')){
    const ang=(G.sa||0) - Math.PI/2;
    GCC.translate(mx,my);GCC.rotate(ang);
    GCC.fillStyle='#5a4a30';GCC.strokeStyle='#7a6a4a';GCC.lineWidth=2;
    rRect(GCC,-SW/2,-SH/2,SW,SH,3);GCC.fill();GCC.stroke();
    GCC.restore();
    GCC.fillStyle='rgba(200,169,110,0.5)';GCC.font='10px "Courier New"';GCC.textAlign='center';GCC.textBaseline='middle';
    GCC.fillText(`角度 ${Math.round((G.sa||0)*180/Math.PI)}°`,mx,my-SH/2-8);
  }else if(t.startsWith('camp')){
    GCC.fillStyle=t==='camp_red'?'#5a2020':'#20305a';
    GCC.fillRect(mx-CS,my-CS+5,CS*2,CS*2-5);
    GCC.beginPath();GCC.moveTo(mx-CS-5,my-CS+5);GCC.lineTo(mx,my-CS-8);GCC.lineTo(mx+CS+5,my-CS+5);GCC.closePath();GCC.fill();
    GCC.restore();
  }else{
    const r=t.endsWith('_r'),c=r?'#c44':'#48f',a=G.pa||0;
    const da=a-Math.PI/2;
    GCC.translate(mx,my);
    GCC.strokeStyle=c;GCC.lineWidth=2;
    GCC.beginPath();GCC.arc(0,0,UR,0,Math.PI*2);GCC.stroke();
    GCC.strokeStyle=c;GCC.lineWidth=2;
    GCC.beginPath();GCC.moveTo(0,0);GCC.lineTo(Math.cos(da)*(UR+8),Math.sin(da)*(UR+8));GCC.stroke();
    const gx=Math.cos(da)*(UR+8),gy=Math.sin(da)*(UR+8);
    const px=Math.cos(da+Math.PI/2),py=Math.sin(da+Math.PI/2);
    GCC.beginPath();GCC.moveTo(gx,gy);GCC.lineTo(gx+px*4,gy+py*4);GCC.stroke();
    GCC.restore();
    GCC.fillStyle='rgba(200,169,110,0.5)';GCC.font='9px "Courier New"';GCC.textAlign='center';GCC.textBaseline='middle';
    GCC.fillText(`角度 ${Math.round(a*180/Math.PI)}°`,mx,my+UR+12);
    GCC.strokeStyle='rgba(200,169,110,0.1)';GCC.setLineDash([3,3]);
    GCC.beginPath();GCC.arc(mx,my,CM*3,0,Math.PI*2);GCC.stroke();GCC.setLineDash([]);
    GCC.restore();
  }
}

function drawTrap(){
  for(const u of G.units){
    if(u.eliminated||!u.trapped)continue;
    GCC.save();
    GCC.strokeStyle='#aa0';GCC.lineWidth=1.5;GCC.setLineDash([3,3]);
    GCC.beginPath();GCC.arc(u.x,u.y,UR+4,0,Math.PI*2);GCC.stroke();GCC.setLineDash([]);
    GCC.fillStyle='#aa0';GCC.font='9px "Courier New"';GCC.textAlign='center';GCC.textBaseline='middle';
    GCC.fillText('被困',u.x,u.y-UR-6);
    GCC.restore();
  }
}

function drawMortarPrev(){
  if(!G.selMortar)return;
  const mx=G.mx,my=G.my;
  if(mx<0||mx>MS||my<0||my>MS)return;
  GCC.save();
  GCC.strokeStyle='#ff0';GCC.lineWidth=1.5;
  GCC.beginPath();GCC.moveTo(mx-5,my);GCC.lineTo(mx+5,my);GCC.stroke();
  GCC.beginPath();GCC.moveTo(mx,my-5);GCC.lineTo(mx,my+5);GCC.stroke();
  GCC.strokeStyle='rgba(255,200,0,0.3)';GCC.setLineDash([4,4]);
  GCC.beginPath();GCC.arc(mx,my,CM*1,0,Math.PI*2);GCC.stroke();GCC.setLineDash([]);
  GCC.fillStyle='rgba(255,200,0,0.5)';GCC.font='10px "Courier New"';GCC.textAlign='center';GCC.textBaseline='middle';
  GCC.fillText('点击确认目标',mx,my-14);
  if(G.selU&&G.selU.type==='mortar'){
    const cd=G.camps.red&&G.camps.blue?dist(G.camps.red,G.camps.blue):MS,mr=cd/2;
    GCC.strokeStyle='rgba(255,200,0,0.1)';GCC.setLineDash([4,4]);
    GCC.beginPath();GCC.arc(G.selU.x,G.selU.y,mr,0,Math.PI*2);GCC.stroke();GCC.setLineDash([]);
  }
  GCC.restore();
}

function rRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ===== 工具选择 =====
function selTool(t){
  if(G.state===SD){if(!t.startsWith('shelter')&&!t.startsWith('camp')){hint('绘制阶段只能放掩体和营地');return;}
  }else{
    if(t.startsWith('shelter')||t.startsWith('camp')){hint('游戏开始后不能放');return;}
    const te=t.endsWith('_r')?'red':'blue';
    if(te!==G.phase){hint(`现在是${G.phase==='red'?'红':'蓝'}方回合`);return;}
  }
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('act'));
  const el=document.querySelector(`[data-tool="${t}"]`);
  if(el)el.classList.add('act');
  G.selT=t;G.pa=0;
  showCancelBtn();showAngleKnob();
  hint(t.startsWith('shelter')?'点击放置，双指旋转调角度':'点击放置，双指旋转调角度');
  // 移动端选中后收起面板
  if(window.innerWidth<600){
    document.getElementById('mobileToolPanel').style.display='none';
    document.querySelector('.mtp-close').style.display='none';
  }
}

function hint(t){document.getElementById('hintTxt').textContent=t;}

  closePop();
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('act'));

function adjAngle(step){

  }else if(G.selT&&G.state!==SD){

  }
  updKnob();draw();
  if(G.selT==='shelter')hint(`掩体角度 ${Math.round((G.sa||0)*180/Math.PI)}°`);
  else if(G.buildWall)hint(`掩体角度 ${Math.round((G.pa||0)*180/Math.PI)}°`);

// ===== Canvas事件 =====
GC.addEventListener('mousemove',e=>{
  const r=GC.getBoundingClientRect();
  G.mx=(e.clientX-r.left)*MS/r.width;G.my=(e.clientY-r.top)*MS/r.height;
  draw();
});

GC.addEventListener('wheel',e=>{
  e.preventDefault();
  const d=e.deltaY>0?0.1:-0.1;
  if(G.selT==='shelter'&&G.state===SD){
    G.sa=(G.sa||0)+d;updKnob();
    hint(`掩体角度 ${Math.round(G.sa*180/Math.PI)}°（双指或滚轮调角度）`);
    draw();
  }else if(G.buildWall){
    G.pa=(G.pa||0)+d;updKnob();
    hint(`掩体角度 ${Math.round(G.pa*180/Math.PI)}°`);
    draw();
  }else if(G.selT&&G.state!==SD){
    G.pa=(G.pa||0)+d;updKnob();
    hint(`放置角度 ${Math.round(G.pa*180/Math.PI)}°`);
    draw();
  }
});
// 确保画布能接收滚轮事件和键盘事件
GC.addEventListener('mouseenter',()=>GC.focus());
GC.setAttribute('tabindex','0');
// 触屏事件（移动端适配）
GC.addEventListener('touchstart',e=>{
  e.preventDefault();
  const r=GC.getBoundingClientRect();
  if(e.touches.length===1){
    const t=e.touches[0];
    G.mx=(t.clientX-r.left)*MS/r.width;G.my=(t.clientY-r.top)*MS/r.height;
    G._touchStart={x:G.mx,y:G.my};
  }
  if(e.touches.length===2){
    // 双指：记录初始角度差
    const t1=e.touches[0],t2=e.touches[1];
    G._twoFingerStart=Math.atan2(t2.clientY-t1.clientY,t2.clientX-t1.clientX);
    G._angleStart=(G.selT==='shelter'&&G.state===SD)?(G.sa||0):(G.pa||0);
  }
},{passive:false});
GC.addEventListener('touchmove',e=>{
  e.preventDefault();
  const r=GC.getBoundingClientRect();
  if(e.touches.length===2&&G._twoFingerStart!==undefined){
    // 双指旋转 -> 调整角度
    const t1=e.touches[0],t2=e.touches[1];
    const cur=Math.atan2(t2.clientY-t1.clientY,t2.clientX-t1.clientX);
    let diff=cur-G._twoFingerStart;
    while(diff>Math.PI)diff-=Math.PI*2;
    while(diff<-Math.PI)diff+=Math.PI*2;
    const newAngle=G._angleStart+diff;
    if(G.selT==='shelter'&&G.state===SD){
      G.sa=newAngle;
    }else if(G.buildWall||G.selT){
      G.pa=newAngle;
    }
    updKnob();draw();
  }else if(e.touches.length===1){
    const t=e.touches[0];
    G.mx=(t.clientX-r.left)*MS/r.width;G.my=(t.clientY-r.top)*MS/r.height;
    draw();
  }
},{passive:false});
GC.addEventListener('touchend',e=>{
  // touchend 不可取消，不调 preventDefault（否则浏览器报 passive 警告）
  // 双指手势结束
  if(e.touches.length<2){G._twoFingerStart=undefined;}
  if(e.touches.length>0)return; // 还有手指在屏幕上，不触发点击
  const mx=G.mx,my=G.my;
  // 瞄准模式下，松手不开火（需按开火按钮），但点选自己单位可退出瞄准
  if(G.aimMode){
    if(G._touchStart&&dist({x:mx,y:my},G._touchStart)<5){
      // 几乎没移动 = 点击
      if(dist({x:mx,y:my},G.selU)<UR+6){
        doAimFire(mx,my); // 点自己退出瞄准
      }
      // 否则什么都不做，等开火按钮
    }
    G._touchStart=null;
    return;
  }
  if(G._touchStart&&dist({x:mx,y:my},G._touchStart)>10){
    // 是拖动不是点击，忽略
    G._touchStart=null;
    return;
  }
  G._touchStart=null;
  if(G.buildWall){placeWall(mx,my);return;}
  if(G.selMortar){placeMortarT(mx,my);return;}
  if(G.selT){place(mx,my);return;}
  if(G.selU){clickUnit(mx,my);return;}
  trySel(mx,my);
});
document.addEventListener('keydown',e=>{
  if(e.key==='t'||e.key==='T'){doCancel();draw();}
});

GC.addEventListener('click',e=>{
  if(G.over)return;
  const r=GC.getBoundingClientRect();
  const mx=(e.clientX-r.left)*MS/r.width,my=(e.clientY-r.top)*MS/r.height;
  if(G.aimMode){doAimFire(mx,my);return;}
  if(G.buildWall){placeWall(mx,my);return;}
  if(G.selMortar){placeMortarT(mx,my);return;}
  if(G.selT){place(mx,my);return;}
  if(G.selU){clickUnit(mx,my);return;}
  trySel(mx,my);
});

// ===== 放置 =====
function place(mx,my){
  const t=G.selT;if(!t)return;
  if(G.state===SD){
    if(t==='shelter'){
      G.shelters.push({x:mx-SW/2,y:my-SH/2,w:SW,h:SH,hp:Infinity,angle:G.sa||0});
      hint('掩体已放置');
    }else if(t==='camp_red'){
      if(G.camps&&G.camps.red){hint('红方营地已存在');return;}
      if(!G.camps)G.camps={};
      G.camps.red={x:mx,y:my,hp:5,team:'red'};hint('红方营地已放置');
    }else if(t==='camp_blue'){
      if(G.camps&&G.camps.blue){hint('蓝方营地已存在');return;}
      if(!G.camps)G.camps={};
      G.camps.blue={x:mx,y:my,hp:5,team:'blue'};hint('蓝方营地已放置');
    }
    hideAngleKnob();hideCancelBtn();updUI();draw();return;
  }
  if(!canP({x:mx,y:my})){hint('必须在己方营地或单位3cm内');return;}
  if(overlap({x:mx,y:my},UR)){hint('位置重叠');return;}
  if(G.step>=1){hint('本回合步数已用完');return;}
  const r=t.endsWith('_r'),te=r?'red':'blue';
  let type;
  if(t.startsWith('soldier'))type='soldier';
  else if(t.startsWith('sniper'))type='sniper';
  else if(t.startsWith('engineer'))type='engineer';
  else if(t.startsWith('mortar'))type='mortar';
  else if(t.startsWith('interceptor'))type='interceptor';
  else return;
  const a=G.pa||0;
  const u=makeUnit(type,te,mx,my,a);
  if(type==='soldier'||type==='sniper'||type==='mortar')u.facing=a;
  if(type==='mortar'){
    G.units.push(u);G.step++;G.selT=null;G.pa=0;
    document.querySelectorAll('.tb').forEach(b=>b.classList.remove('act'));
    G.selU=u;G.selMortar=true;
    hint('选择目标位置');updUI();draw();return;
  }
  G.units.push(u);G.step++;G.selT=null;G.pa=0;
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('act'));
  hideAngleKnob();hideCancelBtn();
  hint(`${u.label}已放置`);
  animP(u);updUI();draw();autoEnd();
}

function placeMortarT(mx,my){
  const u=G.selU;
  if(!u||u.type!=='mortar'){G.selMortar=false;return;}
  const cd=G.camps.red&&G.camps.blue?dist(G.camps.red,G.camps.blue):MS;
  if(dist(u,{x:mx,y:my})>cd/2){hint('超出射程');return;}
  u.mortarTarget={x:mx,y:my};G.selMortar=false;
  hint('目标已设定');updUI();draw();autoEnd();
}

function placeWall(mx,my){
  const e=G.builder;
  if(!e||e.eliminated){G.buildWall=false;hideAngleKnob();hideCancelBtn();return;}
  if(dist(e,{x:mx,y:my})>CM*3){hint('必须在工程兵3cm内');return;}
  const w=makeUnit('wall',e.team,mx,my,G.pa||0);
  w.team=e.team;
  G.units.push(w);G.step++;
  G.buildWall=false;G.builder=null;G.pa=0;
  hideAngleKnob();hideCancelBtn();
  hint('掩体已建造');checkTrap();updUI();draw();autoEnd();
}

// 检查所有单位是否被墙盖住，更新 trapped 状态
function checkTrap(){
  for(const u of G.units){
    if(u.eliminated||u.type==='wall')continue;
    let trapped=false,trapW=null;
    for(const w of G.units){
      if(w.type!=='wall'||w.eliminated)continue;
      // 墙本地矩形是 w x h（默认 50x6 横向），绘制时 rotate(facing-PI/2)
      // 所以墙的本地 x 轴在世界中的角度 = facing - PI/2
      const dx=u.x-w.x,dy=u.y-w.y;
      const wallAngle=w.facing-Math.PI/2; // 墙本地 x 轴在世界中的角度
      const cs=Math.cos(wallAngle),sn=Math.sin(wallAngle);
      // 把世界向量旋转 -wallAngle，得到墙的本地坐标
      const rx=dx*cs+dy*sn;
      const ry=-dx*sn+dy*cs;
      const ww=w.w||50,hh=w.h||6;
      // 单位半径UR，要困住需单位圆心在墙矩形内（含UR容差）
      if(Math.abs(rx)<ww/2+UR-2&&Math.abs(ry)<hh/2+UR-2){
        trapped=true;trapW=w;break;
      }
    }
    if(trapped&&!u.trapped){
      u.trapped=true;
      hint(u.label+'被掩体盖住，无法行动！');
    }else if(!trapped&&u.trapped){
      u.trapped=false;
    }
  }
}

function canP(p){
  const c=G.phase==='red'?G.camps.red:G.camps.blue;
  if(c&&inR(p,c))return true;
  for(const u of G.units)if(!u.eliminated&&u.team===G.phase&&inR(p,u))return true;
  return false;
}

function overlap(p,rr){
  for(const u of G.units)if(!u.eliminated&&dist(p,u)<rr+UR)return true;
  if(G.camps.red&&dist(p,G.camps.red)<rr+CS)return true;
  if(G.camps.blue&&dist(p,G.camps.blue)<rr+CS)return true;
  return false;
}

// ===== 创建单位 =====
function makeUnit(type,team,x,y,angle){
  const b={
    id:Date.now()+Math.random(),type,team,x,y,
    hp:1,maxHp:1,ammo:0,maxAmmo:0,atk:0,
    eliminated:false,trapped:false,facing:angle||0,
    bulletsFired:0,reservedCement:0,
    mortarTarget:null,interceptAmmo:0,label:''
  };
  switch(type){
    case'soldier':b.hp=3;b.maxHp=3;b.ammo=5;b.maxAmmo=5;b.atk=1;b.label='普通兵';break;
    case'sniper':b.hp=1;b.maxHp=1;b.ammo=2;b.maxAmmo=2;b.atk=2;b.label='狙击兵';break;
    case'engineer':b.hp=1;b.maxHp=1;b.label='工程兵';break;
    case'mortar':b.hp=1;b.maxHp=1;b.ammo=0;b.maxAmmo=Infinity;b.atk=3;b.label='迫击炮';break;
    case'interceptor':b.hp=1;b.maxHp=1;b.interceptAmmo=1;b.label='拦截装置';break;
    case'wall':b.hp=3;b.maxHp=3;b.w=50;b.h=6;b.label='墙';break;
  }
  return b;
}

// ===== 单位操作 =====
function clickUnit(mx,my){
  const u=G.selU;if(!u||u.eliminated)return;
  
  // 检查点击位置是否有单位
  const clicked=findU(mx,my);
  
  // 点击己方其他单位 -> 切换选择
  if(clicked&&clicked!==u&&clicked.team===G.phase){
    G.selU=clicked;
    showCancelBtn();
    showPopup(clicked,mx,my);
    draw();return;
  }
  
  // 点击空白区域 -> 取消选择
  if(!clicked||clicked.eliminated||clicked.trapped||clicked.team!==G.phase){
    G.selU=null;hideCancelBtn();hint('');draw();return;
  }
  
  // 点击选中单位本身 -> 重新弹出弹窗
  if(clicked===u){
    showPopup(u,mx,my);
  }
}

function trySel(mx,my){
  const u=findU(mx,my);
  if(u&&!u.eliminated&&!u.trapped&&u.team===G.phase&&G.state!==SD){
    G.selU=u;
    showCancelBtn();
    showPopup(u,mx,my);
    draw();
  }else if(u&&u.team!==G.phase&&G.selU){
    const s=G.selU;
    if(s.type==='mortar'&&s.ammo>0&&s.mortarTarget)fireM(s);
    else if((s.type==='soldier'||s.type==='sniper')&&s.ammo>0){
      fire(s,Math.atan2(my-s.y,mx-s.x));
    }
  }
}

function findU(mx,my){
  for(const u of G.units)if(!u.eliminated&&dist({x:mx,y:my},u)<UR+6)return u;
  return null;
}

// ===== 小弹窗 =====
function showPopup(unit,mx,my){
  const p=document.getElementById('unitPopup');
  const r=GC.getBoundingClientRect();

// 通用兵种操作（射击/装弹）
function doUnit(action){
  closePop();const u=G.selU;
  if(!u||u.eliminated)return;
  if(action==='fire'){
    if(u.ammo<=0){hint('弹药不足');return;}
    G.aimMode=true;
    showCancelBtn();

    if(window.innerWidth<600){
      document.getElementById('mobileFireBtn').style.display='block';
    }

  }else if(action==='reload'){

    if(u.ammo>=u.maxAmmo){hint('弹药已满');return;}
    u.ammo=u.maxAmmo;u.bulletsFired=0;G.step++;
    hint('换弹完成');updUI();draw();autoEnd();

// 瞄准模式点击开火
function doAimFire(mx,my){
  const u=G.selU;
  if(!u||u.eliminated||u.ammo<=0){G.aimMode=false;document.getElementById('mobileFireBtn').style.display='none';return;}
  // 点击已选单位 -> 退出瞄准
  if(dist({x:mx,y:my},u)<UR+6){
    G.aimMode=false;hideCancelBtn();document.getElementById('mobileFireBtn').style.display='none';hint('');draw();return;
  }
  const a=Math.atan2(my-u.y,mx-u.x);
  let df=a-(u.facing-Math.PI/2);while(df>Math.PI)df-=Math.PI*2;while(df<-Math.PI)df+=Math.PI*2;
  if(Math.abs(df)<=Math.PI/4){
    fire(u,a);
    G.aimMode=false;hideCancelBtn();document.getElementById('mobileFireBtn').style.display='none';
  }else{
    hint('超出射击范围');
  }
}

// 工程兵
function doEng(a){
  closePop();const e=G.selU;
  if(!e||e.eliminated)return;
  if(G.step>=1){hint('步数已用完');return;}
  if(a==='build'){G.buildWall=true;G.builder=e;G.pa=0;showCancelBtn();showAngleKnob();hint('点击地图放置掩体（可调角度）');}
  else if(a==='cement'){e.reservedCement=(e.reservedCement||0)+1;G.step++;hideCancelBtn();hint(`水泥${e.reservedCement}`);updUI();draw();autoEnd();}

    e.reservedCement--;c.hp=Math.min(c.hp+1,5);G.step++;hint(`营地HP:${c.hp}`);updUI();draw();autoEnd();

// 迫击炮
function doMor(a){

// ===== 射击 =====
function fire(shooter,angle){
  if(!shooter||shooter.eliminated){console.log('fire: shooter eliminated');return;}
  if(shooter.trapped){console.log('fire: shooter trapped, skipping');return;}
  if(shooter.ammo<=0){hint('弹药不足');return;}
  shooter.ammo--;shooter.bulletsFired=(shooter.bulletsFired||0)+1;G.step++;
  const sx=shooter.x,sy=shooter.y;
  let hitList=[],stop=MS*1.5,pen=0;
  for(let d=6;d<MS*1.5;d+=6){
    const px=sx+Math.cos(angle)*d,py=sy+Math.sin(angle)*d;
    if(px<0||px>MS||py<0||py>MS){stop=d;break;}
    // 墙
    for(const w of G.units){
      if(w.type!=='wall'||w.eliminated)continue;
      if(hitList.find(h=>h.target===w))continue; // 同一面墙不重复命中
      if(dist({x:px,y:py},w)<w.w/2){
        if(shooter.type==='sniper'&&pen<1){hitList.push({target:w,dmg:shooter.atk,dist:d});pen++;break;}
        else{hitList.push({target:w,dmg:shooter.atk,dist:d});stop=d;break;}
      }
    }
    if(stop!==MS*1.5&&shooter.type!=='sniper')break;
    if(pen>=2)break;
    // 地图掩体（黑墙）——狙击兵可穿透一面，第二面停下；普通兵被挡住
    for(const s of G.shelters||[]){
      let cx=px,cy=py;
      if(s.angle){const ox=s.x+SW/2,oy=s.y+SH/2,cs=Math.cos(-s.angle),sn=Math.sin(-s.angle),dx=cx-ox,dy=cy-oy;cx=dx*cs-dy*sn+ox;cy=dx*sn+dy*cs+oy;}
      if(Math.abs(cy-(s.y+SH/2))<SH/2&&Math.abs(cx-(s.x+SW/2))<SW/2){
        if(shooter.type==='sniper'&&pen<1){pen++;}else{stop=d;}break;
      }
    }
    if(stop!==MS*1.5&&shooter.type!=='sniper')break;
    if(pen>=2)break;
    // 单位
    for(const u of G.units){
      if(u.eliminated||u===shooter||u.type==='wall')continue;
      if(u.trapped)continue;
      if(dist({x:px,y:py},u)<UR+6){
        if(!hitList.find(h=>h.target===u)){
          const dmg=shooter.type==='sniper'&&pen>0?1:shooter.atk;
          hitList.push({target:u,dmg,dist:d});
          if(shooter.type!=='sniper'){stop=d;}pen++;break;
        }
      }
    }
    if(stop!==MS*1.5&&shooter.type!=='sniper')break;
    if(pen>=2&&shooter.type==='sniper')break;
    // 营地
    for(const t of['red','blue']){
      const c=G.camps[t];if(!c)continue;
      if(dist({x:px,y:py},c)<CS+4){
        const dmg=shooter.type==='sniper'&&pen>0?1:shooter.atk;
        hitList.push({target:c,dmg,dist:d,isCamp:true});
        if(shooter.type!=='sniper'){stop=d;}pen++;break;
      }
    }
    if(stop!==MS*1.5&&shooter.type!=='sniper')break;
    if(pen>=2&&shooter.type==='sniper')break;
  }
  console.log('fire: hitList=',hitList.map(h=>h.isCamp?`camp(${h.target.team})dmg=${h.dmg}dist=${h.dist.toFixed(0)}`:`${h.target.type}(${h.target.team})dmg=${h.dmg}dist=${h.dist.toFixed(0)}`),'stop=',stop.toFixed(0),'angle=',(angle*57.3).toFixed(0)+'°');
  animBullet(sx,sy,angle,hitList,stop);
  G.selU=null;updUI();draw();
}

function animBullet(sx,sy,angle,hitList,stop){
  let d=0,app=0;
  console.log('animBullet: start, hitList.length=',hitList.length,'stop=',stop.toFixed(0));
  const iv=setInterval(()=>{
    d+=25;
    if(d>stop+10){
      // 动画结束前，确保所有未处理的 hitList 项都生效
      while(app<hitList.length){
        const h=hitList[app];
        console.log('animBullet: final processing hit',h.isCamp?'camp':h.target.type,'dmg=',h.dmg);
        if(h.isCamp){h.target.hp-=h.dmg;if(h.target.hp<=0){h.target.hp=0;endG(h.target.team==='red'?'blue':'red');}}
        else dmgU(h.target,h.dmg);
        app++;
      }
      clearInterval(iv);chkOver();autoEnd();draw();return;
    }
    const px=sx+Math.cos(angle)*d,py=sy+Math.sin(angle)*d;
    draw();
    GCC.save();GCC.fillStyle='#ff0';GCC.shadowColor='#ff0';GCC.shadowBlur=10;
    GCC.beginPath();GCC.arc(px,py,3,0,Math.PI*2);GCC.fill();GCC.restore();
    while(app<hitList.length&&d>=hitList[app].dist){
      const h=hitList[app];
      console.log('animBullet: hit!',h.isCamp?'camp('+h.target.team+')':h.target.type+'('+h.target.team+')','dmg=',h.dmg,'hp_before=',h.isCamp?h.target.hp:h.target.hp);
      if(h.isCamp){h.target.hp-=h.dmg;if(h.target.hp<=0){h.target.hp=0;endG(h.target.team==='red'?'blue':'red');}}
      else dmgU(h.target,h.dmg);
      app++;
    }
  },12);
}

function fireM(m){
  if(m.eliminated)return;
  if(!m.mortarTarget){hint('未设目标');return;}
  if(!m.ammo){hint('炮弹不足');return;}
  m.ammo--;G.step++;
  const t=m.mortarTarget;let int=false;
  for(const u of G.units){
    if(u.type==='interceptor'&&!u.eliminated&&u.team!==m.team&&dist(u,t)<=CM*3&&u.interceptAmmo>0){
      // 拦截概率：1发=50%，2发=100%
      const prob=u.interceptAmmo>=2?1:0.5;
      if(Math.random()<prob){
        // 拦截成功：消耗全部弹药（2发全没，1发用完）
        u.interceptAmmo=0;
        int=true;hint('被拦截！');break;
      }else{
        // 拦截失败：消耗1发
        u.interceptAmmo--;
      }
    }
  }
  if(!int)animMor(t.x,t.y);
  G.selU=null;updUI();draw();
}

function animMor(tx,ty){
  let r=0,dam=false;
  const mx=CM*1;
  const iv=setInterval(()=>{
    r+=12;
    if(r>mx){clearInterval(iv);chkOver();autoEnd();draw();return;}
    draw();
    GCC.save();GCC.fillStyle=`rgba(200,80,0,${0.25*(1-r/mx)})`;
    GCC.beginPath();GCC.arc(tx,ty,r,0,Math.PI*2);GCC.fill();
    GCC.strokeStyle='#c40';GCC.lineWidth=1.5;GCC.stroke();GCC.restore();
    if(!dam&&r>mx*0.4){
      dam=true;
      for(const u of G.units)if(!u.eliminated&&dist(u,{x:tx,y:ty})<=mx)dmgU(u,3);
      for(const t of['red','blue']){const c=G.camps[t];if(c&&dist(c,{x:tx,y:ty})<=mx){c.hp-=3;if(c.hp<=0){c.hp=0;endG(t==='red'?'blue':'red');}}}
      hint('爆炸！范围3伤害');
    }
  },20);
}

function dmgU(u,d){
  if(u.eliminated)return;
  u.hp-=d;
  if(u.hp<=0){u.hp=0;u.eliminated=true;animD(u);
    // 墙被消灭后，重新检查所有单位的被困状态
    if(u.type==='wall')checkTrap();
  }
}

    const fireable=bu.filter(u=>(u.type==='soldier'||u.type==='sniper')&&u.ammo>0&&!u.trapped);
    // 优先级2: 迫击炮可以直接开炮的(排除被困)
    const mortarReady=bu.filter(u=>u.type==='mortar'&&u.ammo>0&&u.mortarTarget&&!u.trapped);
    // 优先级3: 迫击炮需要装弹(排除被困)
    const mortarNeedAmmo=bu.filter(u=>u.type==='mortar'&&(u.ammo||0)===0&&!u.trapped);
    // 优先级4: 迫击炮需要设目标(排除被困)
    const mortarNeedTarget=bu.filter(u=>u.type==='mortar'&&u.ammo>0&&!u.mortarTarget&&!u.trapped);
    // 优先级5: 需要装弹的步兵(排除被困)
    const needReload=bu.filter(u=>(u.type==='soldier'||u.type==='sniper')&&u.ammo===0&&!u.trapped);
    
    if(fireable.length>0){
      const f=fireable[0];
      const idx=bu.indexOf(f);
      // 找能打红营的单位
      const campShooter=fireable.find(u=>{
        if(!G.camps.red)return false;
        const a=Math.atan2(G.camps.red.y-u.y,G.camps.red.x-u.x);
        let df=a-(u.facing-Math.PI/2);while(df>Math.PI)df-=Math.PI*2;while(df<-Math.PI)df+=Math.PI*2;
        return Math.abs(df)<=Math.PI/4;
      });
      if(campShooter){
        ctx.push(`建议:control_unit unit_index=${bu.indexOf(campShooter)} action=fire target_x=${Math.round(G.camps.red.x)} target_y=${Math.round(G.camps.red.y)} 打红营`);
      }else{
        ctx.push(`建议:control_unit unit_index=${idx} action=fire 打射角内的红方单位`);
      }
    }else if(mortarReady.length>0){
      ctx.push(`建议:control_unit unit_index=${bu.indexOf(mortarReady[0])} action=fire_mortar 迫击炮直接开炮`);
    }else if(mortarNeedTarget.length>0&&G.camps.red){
      ctx.push(`建议:control_unit unit_index=${bu.indexOf(mortarNeedTarget[0])} action=set_mortar_target target_x=${Math.round(G.camps.red.x)} target_y=${Math.round(G.camps.red.y)} 设迫击炮目标为红营`);
    }else if(mortarNeedAmmo.length>0){
      ctx.push(`建议:control_unit unit_index=${bu.indexOf(mortarNeedAmmo[0])} action=load_mortar 迫击炮装弹`);
    }else if(needReload.length>0){
      ctx.push(`建议:control_unit unit_index=${bu.indexOf(needReload[0])} action=reload 装弹`);
    }else{
      ctx.push('建议:部署新单位或让工程兵行动');
    }
  }
  return ctx.join('\n');
}

async function aiTurn(){
  if(!G.aiMode||G.phase!=='blue'||G.state===SD||G.over)return;
  const context=buildGameContext();
  let extra='';
  if(aiRetryCount>0)extra=`\n⚠️ 上次操作失败，请换一个合法操作。`;
  
  const messages=[
    {role:'system',content:`你正在玩"核邪部队"这款战争策略游戏，作为蓝方指挥官，你的唯一目标是摧毁红方营地获得胜利。你和红方是敌对关系，战场上一方必须被消灭。

重要：每回合只能执行1个操作（部署1个单位或控制1个单位行动）。只返回当前回合要做的1件事。

==兵种与操作详解==
soldier 普通兵(3HP,5弹,1伤,射角±45°):
  - fire: 射击(target_x/y必填,目标必须在朝向±45°内)
  - reload: 装弹(弹满时不可用)

sniper 狙击兵(1HP,2弹,2伤,可穿透1面墙,射角±45°):
  - fire: 射击(target_x/y必填,可穿1面墙)
  - reload: 装弹

engineer 工程兵(1HP):
  - build_wall: 在身边建掩体(target_x/y必填,需在身边3cm内,不需消耗水泥)
    掩体3HP,子弹不可穿透(狙击兵可穿1面),用于保护脆弱单位
    策略:在己方脆弱单位(sniper/soldier/mortar)与红方之间放掩体挡弹
  - add_cement: 装水泥(为修营地做准备)
  - repair_camp: 修复蓝方营地(消耗1水泥,+1HP,需营地HP<5)

mortar 迫击炮(1HP,3伤范围伤害,射程约两营地距离一半):
  操作三步曲(每步消耗1回合):
  1. load_mortar: 装填炮弹(从0弹开始必须先装)
  2. set_mortar_target: 设定目标(target_x/y必填,建议设为红营坐标)
  3. fire_mortar: 开炮(消耗1弹,3伤范围伤害)
  注意:迫击炮不受射角限制,可直接打到目标位置!

interceptor 拦截装置(1HP):
  - load_interceptor: 装拦截弹(最多2发,1发50%拦截/2发100%拦截敌方迫击炮)

坐标系：X右Y下，0-800。朝向角度：0=上,90=右,180=下,-90°=左。
射击范围：单位朝向±45°内才能开火。上下文中已标注每个单位"可打"哪些目标。

掩体盖住规则：当掩体(wall)盖住单位时，该单位被标记为"被困"，无法进行任何操作（不能射击/装弹/建造等）。只有打掉盖住的掩体（wall 3HP）才能解除被困状态。被困单位在上下文中标注为【被困】。

休战期(前3回合)：只能部署。优先部署soldier和sniper，部署在蓝方营地附近，朝向红方营地方向。也可以部署mortar为战斗期做准备。
战斗期(第4回合起)：
  - 优先让"可打红营"的soldier/sniper开火攻击红方营地
  - 迫击炮如果有弹有目标直接fire_mortar，没弹先load_mortar，有弹没目标先set_mortar_target打红营
  - 工程兵优先为脆弱单位建掩体(build_wall)挡子弹,营地受损时repair_camp
  - 弹药用完要reload
  - 上下文中每个单位都标注了"下一步"建议操作，按建议执行

每回合调用1个工具。记住：你的敌人是红方，消灭他们！`},
    {role:'user',content:context+extra}
  ];

  console.log('=== AI CONTEXT ===');console.log(context);

  try{
    hint('AI思考中...');
    const resp=await fetch(AI_API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${AI_API_KEY}`},
      body:JSON.stringify({model:AI_MODEL,messages,tools:AI_TOOLS,tool_choice:'required',temperature:0.6,max_tokens:300})
    });
    const data=await resp.json();
    console.log('=== AI RAW ===');console.log(JSON.stringify(data).slice(0,500));
    
    const msg=data.choices?.[0]?.message;
    if(!msg){hint('AI无响应');swTurn();return;}
    
    // 检查 tool_calls
    if(msg.tool_calls&&msg.tool_calls.length>0){
      const tc=msg.tool_calls[0];
      const fn=tc.function;
      console.log('AI调用工具:',fn.name,fn.arguments);
      const args=JSON.parse(fn.arguments);
      execAiTool(fn.name,args);
    }else if(msg.content){
      // fallback: 从content中提取JSON（可能被截断）
      console.log('AI content:',msg.content);
      // 尝试提取 ```json 代码块
      const jsonBlock=msg.content.match(/```json\s*([\s\S]*?)```/);
      let jsonStr=jsonBlock?jsonBlock[1].trim():msg.content;
      // 如果被截断，尝试找第一个完整的JSON对象
      if(data.choices[0].finish_reason==='length'){
        // 截断了，只取第一个完整的操作
        const firstOp=jsonStr.match(/\{[\s\S]*?"name"\s*:\s*"(deploy_unit|control_unit)"[\s\S]*?\}/);
        if(firstOp)jsonStr=firstOp[0];
      }
      // 尝试找第一个JSON对象
      const m=jsonStr.match(/\{[\s\S]*\}/);
      if(m){
        try{
          const d=JSON.parse(m[0]);
          if(d.name==='deploy_unit'){
            execAiTool('deploy_unit',{unit_type:d.parameters.unit_type,x:d.parameters.x,y:d.parameters.y,facing:d.parameters.facing});
          }else if(d.name==='control_unit'){
            execAiTool('control_unit',{unit_index:d.parameters.unit_index,action:d.parameters.action,target_x:d.parameters.target_x,target_y:d.parameters.target_y});
          }else{
            // 尝试旧格式
            if(d.action==='deploy')execAiTool('deploy_unit',{unit_type:d.type,x:d.x,y:d.y,facing:(d.facing||0)*180/Math.PI});
            else if(d.action==='control')execAiTool('control_unit',{unit_index:d.unitIndex,action:d.subAction==='fire'?'fire':d.subAction,target_x:d.targetX,target_y:d.targetY});
            else{aiRetryCount++;if(aiRetryCount<99){console.log('AI: unparseable content, retry',m[0].slice(0,200));setTimeout(()=>aiTurn(),200);return;}swTurn();}
          }
        }catch(e){console.log('parse error',e);aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();}
      }else{aiRetryCount++;if(aiRetryCount<99){console.log('AI: no JSON in content, retry');setTimeout(()=>aiTurn(),200);return;}swTurn();}
    }else{aiRetryCount++;if(aiRetryCount<99){console.log('AI: no tool_call and no content, retry');setTimeout(()=>aiTurn(),200);return;}swTurn();}
  }catch(e){
    console.error('AI error:',e);
    aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),500);return;}
    hint('AI出错');setTimeout(()=>swTurn(),500);
  }
}

function execAiTool(name,args){
  console.log('execAiTool:',name,args);
  if(name==='deploy_unit'){
    const type=args.unit_type,te='blue';
    let unitType;
    if(type==='soldier')unitType='soldier';
    else if(type==='sniper')unitType='sniper';
    else if(type==='engineer')unitType='engineer';
    else if(type==='mortar')unitType='mortar';
    else if(type==='interceptor')unitType='interceptor';
    else{aiRetryCount++;if(aiRetryCount<3){setTimeout(()=>aiTurn(),200);return;}swTurn();return;}
    
    // facing: 度转弧度。AI 给的是"0=右,90=下"坐标系，但游戏 facing 是"0=上"坐标系
    // 修正：AI 的 facing 需要转换。AI说朝红方营地，我们就直接算朝红营地的 facing
    let facing;
    if(G.camps.red){
      // 直接计算朝向红方营地的 facing（弧度），不依赖 AI 给的角度
      const ra=Math.atan2(G.camps.red.y-(args.y||0),G.camps.red.x-(args.x||0));
      facing=ra+Math.PI/2; // atan2(右0) → facing(上0) 的转换
    }else{
      facing=(args.facing||0)*Math.PI/180+Math.PI/2; // fallback
    }
    
    // 位置修正：必须在蓝方营地或蓝方单位3cm内
    let ox=args.x,oy=args.y;
    const bc=G.camps.blue;
    const bases=[];
    if(bc)bases.push(bc);
    for(const u of G.units)if(!u.eliminated&&u.team==='blue')bases.push(u);
    
    let bestX=null,bestY=null;
    for(let attempt=0;attempt<100;attempt++){
      let tx,ty;
      if(attempt===0){tx=ox;ty=oy;}
      else{
        const base=bases[Math.floor(Math.random()*bases.length)];
        const ang=Math.random()*Math.PI*2;
        tx=base.x+Math.cos(ang)*CM*2.5;
        ty=base.y+Math.sin(ang)*CM*2.5;
      }
      tx=Math.max(UR,Math.min(MS-UR,tx));
      ty=Math.max(UR,Math.min(MS-UR,ty));
      const p={x:tx,y:ty};
      let ok=true,inR=false;
      for(const b of bases){if(dist(p,b)<=CM*3){inR=true;break;}}
      if(!inR)continue;
      for(const eu of G.units)if(!eu.eliminated&&dist(p,eu)<UR*2.5){ok=false;break;}
      if(bc&&dist(p,bc)<CS+UR)ok=false;
      if(G.camps.red&&dist(p,G.camps.red)<CS+UR)ok=false;
      if(ok){bestX=tx;bestY=ty;break;}
    }
    if(bestX===null){
      const camp=bc||bases[0];
      bestX=camp.x+(Math.random()-0.5)*CM*2;
      bestY=camp.y+(Math.random()-0.5)*CM*2;
      bestX=Math.max(UR,Math.min(MS-UR,bestX));
      bestY=Math.max(UR,Math.min(MS-UR,bestY));
    }
    
    const u=makeUnit(unitType,te,bestX,bestY,0);
    u.facing=facing; // 统一设置facing
    G.units.push(u);G.step++;aiRetryCount=0;
    hint('AI部署了'+type+' 朝向'+Math.round(facing*180/Math.PI)+'°');
    updUI();draw();autoEnd();
  }else if(name==='control_unit'){
    // unit_index 是 buildGameContext 中蓝方单位的过滤后索引
    const bu=G.units.filter(u=>!u.eliminated&&u.team==='blue');
    const uIdx=parseInt(args.unit_index);
    const u=bu[uIdx];
    console.log('AI control_unit: idx=',args.unit_index,'->parsed=',uIdx,'found=',u?u.type+'('+u.team+') ammo='+u.ammo:'null','blue units count=',bu.length);
    if(!u){aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();return;}
    if(u.trapped){console.log('AI control: unit trapped, skipping');aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();return;}
    G.selU=u;
    if(args.action==='fire'){
      if(u.ammo<=0){console.log('AI fire: no ammo');aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();return;}
      // target_x/y 可能是 undefined，默认打红方营地
      const tx=args.target_x!==undefined?args.target_x:(G.camps.red?G.camps.red.x:400);
      const ty=args.target_y!==undefined?args.target_y:(G.camps.red?G.camps.red.y:400);
      console.log('AI fire: unit=',u.type,'pos=',u.x.toFixed(0),u.y.toFixed(0),'facing=',(u.facing*57.3).toFixed(0)+'°','ammo=',u.ammo,'target=',tx,ty);
      const a=Math.atan2(ty-u.y,tx-u.x);
      // 射角判断：与 doAimFire 一致，facing 的 0 方向是"上"，atan2 的 0 方向是"右"，需要偏移 PI/2
      let df=a-(u.facing-Math.PI/2);while(df>Math.PI)df-=Math.PI*2;while(df<-Math.PI)df+=Math.PI*2;
      console.log('AI fire: target_angle='+(a*57.3).toFixed(0)+'° diff='+(df*57.3).toFixed(0)+'°');
      // 无论如何，自动旋转单位朝向目标（这样总能在射角内）
      u.facing=a+Math.PI/2;
      console.log('AI fire: rotated to face target, new facing='+(u.facing*57.3).toFixed(0)+'°');
      console.log('AI fire: CALLING fire()');
      aiRetryCount=0;
      fire(u,a);
    }else if(args.action==='reload'){
      if(u.ammo<u.maxAmmo){u.ammo=u.maxAmmo;u.bulletsFired=0;G.step++;aiRetryCount=0;updUI();draw();autoEnd();}
      else{aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();}
    }else if(args.action==='build_wall'){
      if(u.type==='engineer'){
        G.buildWall=true;G.builder=u;G.pa=0;
        placeWall(args.target_x||u.x+50,args.target_y||u.y);
        aiRetryCount=0;
      }else{aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();}
    }else if(args.action==='add_cement'){
      if(u.type==='engineer'){u.reservedCement=(u.reservedCement||0)+1;G.step++;aiRetryCount=0;updUI();draw();autoEnd();}
      else{aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();}
    }else if(args.action==='repair_camp'){
      if(u.type==='engineer'&&u.reservedCement>0&&G.camps.blue&&G.camps.blue.hp<5){
        u.reservedCement--;G.camps.blue.hp=Math.min(G.camps.blue.hp+1,5);G.step++;aiRetryCount=0;updUI();draw();autoEnd();
      }else{aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();}
    }else if(args.action==='load_mortar'){
      if(u.type==='mortar'){u.ammo=(u.ammo||0)+1;G.step++;aiRetryCount=0;updUI();draw();autoEnd();}
      else{aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();}
    }else if(args.action==='load_interceptor'){
      if(u.type==='interceptor'){u.interceptAmmo=(u.interceptAmmo||0)+1;G.step++;aiRetryCount=0;updUI();draw();autoEnd();}
      else{aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();}
    }else if(args.action==='set_mortar_target'){
      const mtx=args.target_x!==undefined?args.target_x:(G.camps.red?G.camps.red.x:400);
      const mty=args.target_y!==undefined?args.target_y:(G.camps.red?G.camps.red.y:400);
      if(u.type==='mortar'&&u.ammo>0){u.mortarTarget={x:mtx,y:mty};G.selMortar=false;G.step++;aiRetryCount=0;hint('AI设定迫击炮目标:('+Math.round(mtx)+','+Math.round(mty)+')');updUI();draw();autoEnd();}
      else{aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();}
    }else if(args.action==='fire_mortar'){
      if(u.type==='mortar'&&u.mortarTarget&&u.ammo>0){aiRetryCount=0;fireM(u);}
      else{aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();}
    }else{aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();}
  }else{swTurn();}
}

function swTurn(){
  if(G.phase==='red')G.phase='blue';
  else{G.phase='red';G.turn++;if(G.turn>3)G.state=SB;}
  G.step=0;G.selU=null;G.selT=null;G.pa=0;G.aimMode=false;aiRetryCount=0;
  closePop();hideAngleKnob();hideCancelBtn();document.querySelectorAll('.tb').forEach(b=>b.classList.remove('act'));
  document.getElementById('mobileFireBtn').style.display='none';
  // 收起移动端面板
  document.getElementById('mobileToolPanel').style.display='none';
  document.querySelector('.mtp-close').style.display='none';
  updUI();draw();
  hint(`T${G.turn} ${G.phase==='red'?'红':'蓝'}方${G.turn<=3?'(休战)':''}`);
  // AI 对战：如果是蓝方回合（AI）且非绘制阶段
  if(G.aiMode&&G.phase==='blue'&&G.state!==SD){
    hint('AI思考中...');
    setTimeout(()=>aiTurn(),300);
  }
}
function startGame(){
  if(!G.camps||!G.camps.red||!G.camps.blue){hint('请放置双方营地');return;}
  G.state=ST;G.turn=1;G.phase='red';G.step=0;
  document.getElementById('startBtn').style.display='none';
  updUI();draw();hint('休战期开始！前3回合不能开战');
}
function updUI(){
  if(!G)return;
  document.getElementById('topInfo').textContent=`T${G.turn} ${G.state===SD?'绘制':(G.state===ST?'休战':'战斗')}`;
  const ti=document.getElementById('turnInd');
  if(G.state===SD){ti.textContent='绘制地图';ti.style.color='#8a7a5a';document.getElementById('startBtn').style.display='';}
  else{
    ti.textContent=G.phase==='red'?'[红方回合]':'[蓝方回合]';
    ti.style.color=G.phase==='red'?'#c44':'#48f';
    document.getElementById('startBtn').style.display='none';
    // AI 模式：蓝方回合显示 AI 标记
    document.getElementById('aiBadge').style.display=(G.aiMode&&G.phase==='blue')?'inline':'none';
  }
  document.getElementById('hpR').textContent=`红营:${G.camps&&G.camps.red?G.camps.red.hp:'-'}`;
  document.getElementById('hpB').textContent=`蓝营:${G.camps&&G.camps.blue?G.camps.blue.hp:'-'}`;
  document.querySelectorAll('.unit-tool').forEach(b=>{
    if(G.state===SD)b.classList.add('ht');
    else if((b.classList.contains('r')&&G.phase==='red')||(b.classList.contains('b')&&G.phase==='blue'))b.classList.remove('ht');
    else b.classList.add('ht');
  });
  document.querySelectorAll('.draw-tool').forEach(b=>{
    if(G.state===SD)b.classList.remove('ht');else b.classList.add('ht');
  });
  const ds=document.getElementById('drawST');
  if(ds)ds.style.display=G.state===SD?'block':'none';
  // 移动端面板按钮同步（不隐藏，靠回合判断）
  document.querySelectorAll('#mtpList .tb').forEach(b=>{
    const tool=b.dataset.tool;
    if(!tool)return;
    if(G.state===SD){
      // 绘制阶段只有地图工具可用
      if(!tool.startsWith('shelter')&&!tool.startsWith('camp')){b.classList.add('ht');}
      else b.classList.remove('ht');
    }else{
      if(tool.startsWith('shelter')||tool.startsWith('camp')){b.classList.add('ht');}
      else{
        const te=tool.endsWith('_r')?'red':'blue';
        if(te!==G.phase)b.classList.add('ht');
        else b.classList.remove('ht');
      }
    }
  });
}
function chkOver(){
  if(G.camps.red&&G.camps.red.hp<=0)endG('blue');
  else if(G.camps.blue&&G.camps.blue.hp<=0)endG('red');
}
function endG(w){
  G.over=true;
  setTimeout(()=>showModal(w==='red'?'红方胜利！':'蓝方胜利！','游戏结束'),500);
}
function backToMenu(){
  // 用自定义弹窗替代 confirm（移动端友好）
  document.getElementById('modalBox').innerHTML=
    `<h2>返回菜单</h2><p>返回菜单将丢失当前进度，确定返回？</p>
     <div style="display:flex;gap:10px;justify-content:center">
       <button onclick="document.getElementById('modal').style.display='none'" style="background:#2a4a2a;border-color:#2a6a2a;color:#4a8a4a">取消</button>
       <button onclick="document.getElementById('modal').style.display='none';doBackToMenu()" style="background:#5a2020;border-color:#c44;color:#faa">确定返回</button>
     </div>`;
  document.getElementById('modal').style.display='flex';
}
function doBackToMenu(){
  document.getElementById('gameUI').style.display='none';
  document.getElementById('mainMenu').style.display='block';
  document.getElementById('menuMain').style.display='flex';
  document.getElementById('menuAi').style.display='none';
  document.getElementById('mobileToolPanel').style.display='none';
  document.getElementById('mobileFireBtn').style.display='none';
  G=null;MC.width=window.innerWidth;MC.height=window.innerHeight;drawMenu();
}
function showModal(t,d){
  document.getElementById('modalBox').innerHTML=`<h2>${t}</h2><p>${d}</p><button onclick="document.getElementById('modal').style.display='none'">确定</button>`;
  document.getElementById('modal').style.display='flex';
}

drawMenu();
</script>
</body></html>
