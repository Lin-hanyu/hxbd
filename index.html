async function aiTurn(){
  if(!G.aiMode||G.phase!=='blue'||G.state===SD||G.over)return;
  const context=buildGameContext();
  let extra='';
  if(aiRetryCount>0)extra=`\n⚠️ 上次操作失败，请换一个合法操作。`;
  
  const messages=[
    {role:'system',content:`你正在玩"核邪部队"这款战争策略游戏，作为蓝方指挥官，你的唯一目标是摧毁红方营地获得胜利。你和红方是敌对关系，战场上一方必须被消灭。

重要：每回合只能执行1个操作（部署1个单位或控制1个单位行动）。只返回当前回合要做的1件事。

==兵种与操作详解==
soldier 普通兵(3HP,5弹,1伤,射角±45°):
  - fire: 射击(target_x/y必填,目标必须在朝向±45°内)
  - reload: 装弹(弹满时不可用)

sniper 狙击兵(1HP,2弹,2伤,可穿透1面墙,射角±45°):
  - fire: 射击(target_x/y必填,可穿1面墙)
  - reload: 装弹

engineer 工程兵(1HP):
  - build_wall: 在身边建掩体(target_x/y必填,需在身边3cm内,不需消耗水泥)
    掩体3HP,子弹不可穿透(狙击兵可穿1面),用于保护脆弱单位
    策略:在己方脆弱单位(sniper/soldier/mortar)与红方之间放掩体挡弹
  - add_cement: 装水泥(为修营地做准备)
  - repair_camp: 修复蓝方营地(消耗1水泥,+1HP,需营地HP<5)

mortar 迫击炮(1HP,3伤范围伤害,射程约两营地距离一半):
  操作三步曲(每步消耗1回合):
  1. load_mortar: 装填炮弹(从0弹开始必须先装)
  2. set_mortar_target: 设定目标(target_x/y必填,建议设为红营坐标)
  3. fire_mortar: 开炮(消耗1弹,3伤范围伤害)
  注意:迫击炮不受射角限制,可直接打到目标位置!

interceptor 拦截装置(1HP):
  - load_interceptor: 装拦截弹(最多2发,1发50%拦截/2发100%拦截敌方迫击炮)

坐标系：X右Y下，0-800。朝向角度：0=上,90=右,180=下,-90°=左。
射击范围：单位朝向±45°内才能开火。上下文中已标注每个单位"可打"哪些目标。

掩体盖住规则：当掩体(wall)盖住单位时，该单位被标记为"被困"，无法进行任何操作（不能射击/装弹/建造等）。只有打掉盖住的掩体（wall 3HP）才能解除被困状态。被困单位在上下文中标注为【被困】。

休战期(前3回合)：只能部署。优先部署soldier和sniper，部署在蓝方营地附近，朝向红方营地方向。也可以部署mortar为战斗期做准备。
战斗期(第4回合起)：
  - 优先让"可打红营"的soldier/sniper开火攻击红方营地
  - 迫击炮如果有弹有目标直接fire_mortar，没弹先load_mortar，有弹没目标先set_mortar_target打红营
  - 工程兵优先为脆弱单位建掩体(build_wall)挡子弹,营地受损时repair_camp
  - 弹药用完要reload
  - 上下文中每个单位都标注了"下一步"建议操作，按建议执行

每回合调用1个工具。记住：你的敌人是红方，消灭他们！`},
    {role:'user',content:context+extra}
  ];

  console.log('=== AI CONTEXT ===');console.log(context);

  try{
    hint('AI思考中...');
    const resp=await fetch(AI_API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${AI_API_KEY}`},
      body:JSON.stringify({model:AI_MODEL,messages,tools:AI_TOOLS,tool_choice:'required',temperature:0.6,max_tokens:300})
    });
    const data=await resp.json();
    console.log('=== AI RAW ===');console.log(JSON.stringify(data).slice(0,500));
    
    const msg=data.choices?.[0]?.message;
    if(!msg){hint('AI无响应');swTurn();return;}
    
    // 检查 tool_calls
    if(msg.tool_calls&&msg.tool_calls.length>0){
      const tc=msg.tool_calls[0];
      const fn=tc.function;
      console.log('AI调用工具:',fn.name,fn.arguments);
      const args=JSON.parse(fn.arguments);
      execAiTool(fn.name,args);
    }else if(msg.content){
      // fallback: 从content中提取JSON（可能被截断）
      console.log('AI content:',msg.content);
      // 尝试提取 ```json 代码块
      const jsonBlock=msg.content.match(/```json\s*([\s\S]*?)```/);
      let jsonStr=jsonBlock?jsonBlock[1].trim():msg.content;
      // 如果被截断，尝试找第一个完整的JSON对象
      if(data.choices[0].finish_reason==='length'){
        // 截断了，只取第一个完整的操作
        const firstOp=jsonStr.match(/\{[\s\S]*?"name"\s*:\s*"(deploy_unit|control_unit)"[\s\S]*?\}/);
        if(firstOp)jsonStr=firstOp[0];
      }
      // 尝试找第一个JSON对象
      const m=jsonStr.match(/\{[\s\S]*\}/);
      if(m){
        try{
          const d=JSON.parse(m[0]);
          if(d.name==='deploy_unit'){
            execAiTool('deploy_unit',{unit_type:d.parameters.unit_type,x:d.parameters.x,y:d.parameters.y,facing:d.parameters.facing});
          }else if(d.name==='control_unit'){
            execAiTool('control_unit',{unit_index:d.parameters.unit_index,action:d.parameters.action,target_x:d.parameters.target_x,target_y:d.parameters.target_y});
          }else{
            // 尝试旧格式
            if(d.action==='deploy')execAiTool('deploy_unit',{unit_type:d.type,x:d.x,y:d.y,facing:(d.facing||0)*180/Math.PI});
            else if(d.action==='control')execAiTool('control_unit',{unit_index:d.unitIndex,action:d.subAction==='fire'?'fire':d.subAction,target_x:d.targetX,target_y:d.targetY});
            else{aiRetryCount++;if(aiRetryCount<99){console.log('AI: unparseable content, retry',m[0].slice(0,200));setTimeout(()=>aiTurn(),200);return;}swTurn();}
          }
        }catch(e){console.log('parse error',e);aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();}
      }else{aiRetryCount++;if(aiRetryCount<99){console.log('AI: no JSON in content, retry');setTimeout(()=>aiTurn(),200);return;}swTurn();}
    }else{aiRetryCount++;if(aiRetryCount<99){console.log('AI: no tool_call and no content, retry');setTimeout(()=>aiTurn(),200);return;}swTurn();}
  }catch(e){
    console.error('AI error:',e);
    aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),500);return;}
    hint('AI出错');setTimeout(()=>swTurn(),500);
  }
}

function execAiTool(name,args){
  console.log('execAiTool:',name,args);
  if(name==='deploy_unit'){
    const type=args.unit_type,te='blue';
    let unitType;
    if(type==='soldier')unitType='soldier';
    else if(type==='sniper')unitType='sniper';
    else if(type==='engineer')unitType='engineer';
    else if(type==='mortar')unitType='mortar';
    else if(type==='interceptor')unitType='interceptor';
    else{aiRetryCount++;if(aiRetryCount<3){setTimeout(()=>aiTurn(),200);return;}swTurn();return;}
    
    // facing: 度转弧度。AI 给的是"0=右,90=下"坐标系，但游戏 facing 是"0=上"坐标系
    // 修正：AI 的 facing 需要转换。AI说朝红方营地，我们就直接算朝红营地的 facing
    let facing;
    if(G.camps.red){
      // 直接计算朝向红方营地的 facing（弧度），不依赖 AI 给的角度
      const ra=Math.atan2(G.camps.red.y-(args.y||0),G.camps.red.x-(args.x||0));
      facing=ra+Math.PI/2; // atan2(右0) → facing(上0) 的转换
    }else{
      facing=(args.facing||0)*Math.PI/180+Math.PI/2; // fallback
    }
    
    // 位置修正：必须在蓝方营地或蓝方单位3cm内
    let ox=args.x,oy=args.y;
    const bc=G.camps.blue;
    const bases=[];
    if(bc)bases.push(bc);
    for(const u of G.units)if(!u.eliminated&&u.team==='blue')bases.push(u);
    
    let bestX=null,bestY=null;
    for(let attempt=0;attempt<100;attempt++){
      let tx,ty;
      if(attempt===0){tx=ox;ty=oy;}
      else{
        const base=bases[Math.floor(Math.random()*bases.length)];
        const ang=Math.random()*Math.PI*2;
        tx=base.x+Math.cos(ang)*CM*2.5;
        ty=base.y+Math.sin(ang)*CM*2.5;
      }
      tx=Math.max(UR,Math.min(MS-UR,tx));
      ty=Math.max(UR,Math.min(MS-UR,ty));
      const p={x:tx,y:ty};
      let ok=true,inR=false;
      for(const b of bases){if(dist(p,b)<=CM*3){inR=true;break;}}
      if(!inR)continue;
      for(const eu of G.units)if(!eu.eliminated&&dist(p,eu)<UR*2.5){ok=false;break;}
      if(bc&&dist(p,bc)<CS+UR)ok=false;
      if(G.camps.red&&dist(p,G.camps.red)<CS+UR)ok=false;
      if(ok){bestX=tx;bestY=ty;break;}
    }
    if(bestX===null){
      const camp=bc||bases[0];
      bestX=camp.x+(Math.random()-0.5)*CM*2;
      bestY=camp.y+(Math.random()-0.5)*CM*2;
      bestX=Math.max(UR,Math.min(MS-UR,bestX));
      bestY=Math.max(UR,Math.min(MS-UR,bestY));
    }
    
    const u=makeUnit(unitType,te,bestX,bestY,0);
    u.facing=facing; // 统一设置facing
    G.units.push(u);G.step++;aiRetryCount=0;
    hint('AI部署了'+type+' 朝向'+Math.round(facing*180/Math.PI)+'°');
    updUI();draw();autoEnd();
  }else if(name==='control_unit'){
    // unit_index 是 buildGameContext 中蓝方单位的过滤后索引
    const bu=G.units.filter(u=>!u.eliminated&&u.team==='blue');
    const uIdx=parseInt(args.unit_index);
    const u=bu[uIdx];
    console.log('AI control_unit: idx=',args.unit_index,'->parsed=',uIdx,'found=',u?u.type+'('+u.team+') ammo='+u.ammo:'null','blue units count=',bu.length);
    if(!u){aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();return;}
    if(u.trapped){console.log('AI control: unit trapped, skipping');aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();return;}
    G.selU=u;
    if(args.action==='fire'){
      if(u.ammo<=0){console.log('AI fire: no ammo');aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();return;}
      // target_x/y 可能是 undefined，默认打红方营地
      const tx=args.target_x!==undefined?args.target_x:(G.camps.red?G.camps.red.x:400);
      const ty=args.target_y!==undefined?args.target_y:(G.camps.red?G.camps.red.y:400);
      console.log('AI fire: unit=',u.type,'pos=',u.x.toFixed(0),u.y.toFixed(0),'facing=',(u.facing*57.3).toFixed(0)+'°','ammo=',u.ammo,'target=',tx,ty);
      const a=Math.atan2(ty-u.y,tx-u.x);
      // 射角判断：与 doAimFire 一致，facing 的 0 方向是"上"，atan2 的 0 方向是"右"，需要偏移 PI/2
      let df=a-(u.facing-Math.PI/2);while(df>Math.PI)df-=Math.PI*2;while(df<-Math.PI)df+=Math.PI*2;
      console.log('AI fire: target_angle='+(a*57.3).toFixed(0)+'° diff='+(df*57.3).toFixed(0)+'°');
      // 无论如何，自动旋转单位朝向目标（这样总能在射角内）
      u.facing=a+Math.PI/2;
      console.log('AI fire: rotated to face target, new facing='+(u.facing*57.3).toFixed(0)+'°');
      console.log('AI fire: CALLING fire()');
      aiRetryCount=0;
      fire(u,a);
    }else if(args.action==='reload'){
      if(u.ammo<u.maxAmmo){u.ammo=u.maxAmmo;u.bulletsFired=0;G.step++;aiRetryCount=0;updUI();draw();autoEnd();}
      else{aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();}
    }else if(args.action==='build_wall'){
      if(u.type==='engineer'){
        G.buildWall=true;G.builder=u;G.pa=0;
        placeWall(args.target_x||u.x+50,args.target_y||u.y);
        aiRetryCount=0;
      }else{aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();}
    }else if(args.action==='add_cement'){
      if(u.type==='engineer'){u.reservedCement=(u.reservedCement||0)+1;G.step++;aiRetryCount=0;updUI();draw();autoEnd();}
      else{aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();}
    }else if(args.action==='repair_camp'){
      if(u.type==='engineer'&&u.reservedCement>0&&G.camps.blue&&G.camps.blue.hp<5){
        u.reservedCement--;G.camps.blue.hp=Math.min(G.camps.blue.hp+1,5);G.step++;aiRetryCount=0;updUI();draw();autoEnd();
      }else{aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();}
    }else if(args.action==='load_mortar'){
      if(u.type==='mortar'){u.ammo=(u.ammo||0)+1;G.step++;aiRetryCount=0;updUI();draw();autoEnd();}
      else{aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();}
    }else if(args.action==='load_interceptor'){
      if(u.type==='interceptor'){u.interceptAmmo=(u.interceptAmmo||0)+1;G.step++;aiRetryCount=0;updUI();draw();autoEnd();}
      else{aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();}
    }else if(args.action==='set_mortar_target'){
      const mtx=args.target_x!==undefined?args.target_x:(G.camps.red?G.camps.red.x:400);
      const mty=args.target_y!==undefined?args.target_y:(G.camps.red?G.camps.red.y:400);
      if(u.type==='mortar'&&u.ammo>0){u.mortarTarget={x:mtx,y:mty};G.selMortar=false;G.step++;aiRetryCount=0;hint('AI设定迫击炮目标:('+Math.round(mtx)+','+Math.round(mty)+')');updUI();draw();autoEnd();}
      else{aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();}
    }else if(args.action==='fire_mortar'){
      if(u.type==='mortar'&&u.mortarTarget&&u.ammo>0){aiRetryCount=0;fireM(u);}
      else{aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();}
    }else{aiRetryCount++;if(aiRetryCount<99){setTimeout(()=>aiTurn(),200);return;}swTurn();}
  }else{swTurn();}
}

function swTurn(){
  if(G.phase==='red')G.phase='blue';
  else{G.phase='red';G.turn++;if(G.turn>3)G.state=SB;}
  G.step=0;G.selU=null;G.selT=null;G.pa=0;G.aimMode=false;aiRetryCount=0;
  closePop();hideAngleKnob();hide取消Btn();document.querySelectorAll('.tb').forEach(b=>b.classList.remove('act'));
  document.getElementById('mobileFireBtn').style.display='none';
  // 收起移动端面板
  document.getElementById('mobileToolPanel').style.display='none';
  document.querySelector('.mtp-close').style.display='none';
  updUI();draw();
  hint(`T${G.turn} ${G.phase==='red'?'红':'蓝'}方${G.turn<=3?'(休战)':''}`);
  // AI 对战：如果是蓝方回合（AI）且非绘制阶段
  if(G.aiMode&&G.phase==='blue'&&G.state!==SD){
    hint('AI思考中...');
    setTimeout(()=>aiTurn(),300);
  }
}
function startGame(){
  if(!G.camps||!G.camps.red||!G.camps.blue){hint('请放置双方营地');return;}
  G.state=ST;G.turn=1;G.phase='red';G.step=0;
  document.getElementById('startBtn').style.display='none';
  updUI();draw();hint('休战期开始！前3回合不能开战');
}
function updUI(){
  if(!G)return;
  document.getElementById('topInfo').textContent=`T${G.turn} ${G.state===SD?'绘制':(G.state===ST?'休战':'战斗')}`;
  const ti=document.getElementById('turnInd');
  if(G.state===SD){ti.textContent='绘制地图';ti.style.color='#8a7a5a';document.getElementById('startBtn').style.display='';}
  else{
    ti.textContent=G.phase==='red'?'[红方回合]':'[蓝方回合]';
    ti.style.color=G.phase==='red'?'#c44':'#48f';
    document.getElementById('startBtn').style.display='none';
    // AI 模式：蓝方回合显示 AI 标记
    document.getElementById('aiBadge').style.display=(G.aiMode&&G.phase==='blue')?'inline':'none';
  }
  document.getElementById('hpR').textContent=`红营:${G.camps&&G.camps.red?G.camps.red.hp:'-'}`;
  document.getElementById('hpB').textContent=`蓝营:${G.camps&&G.camps.blue?G.camps.blue.hp:'-'}`;
  document.querySelectorAll('.unit-tool').forEach(b=>{
    if(G.state===SD)b.classList.add('ht');
    else if((b.classList.contains('r')&&G.phase==='red')||(b.classList.contains('b')&&G.phase==='blue'))b.classList.remove('ht');
    else b.classList.add('ht');
  });
  document.querySelectorAll('.draw-tool').forEach(b=>{
    if(G.state===SD)b.classList.remove('ht');else b.classList.add('ht');
  });
  const ds=document.getElementById('drawST');
  if(ds)ds.style.display=G.state===SD?'block':'none';
  // 移动端面板按钮同步（不隐藏，靠回合判断）
  document.querySelectorAll('#mtpList .tb').forEach(b=>{
    const tool=b.dataset.tool;
    if(!tool)return;
    if(G.state===SD){
      // 绘制阶段只有地图工具可用
      if(!tool.startsWith('shelter')&&!tool.startsWith('camp')){b.classList.add('ht');}
      else b.classList.remove('ht');
    }else{
      if(tool.startsWith('shelter')||tool.startsWith('camp')){b.classList.add('ht');}
      else{
        const te=tool.endsWith('_r')?'red':'blue';
        if(te!==G.phase)b.classList.add('ht');
        else b.classList.remove('ht');
      }
    }
  });
}
function chkOver(){
  if(G.camps.red&&G.camps.red.hp<=0)endG('blue');
  else if(G.camps.blue&&G.camps.blue.hp<=0)endG('red');
}
function endG(w){
  G.over=true;
  setTimeout(()=>showModal(w==='red'?'红方胜利！':'蓝方胜利！','游戏结束'),500);
}
function backToMenu(){
  // 用自定义弹窗替代 confirm（移动端友好）
  document.getElementById('modalBox').innerHTML=
    `<h2>返回菜单</h2><p>返回菜单将丢失当前进度，确定返回？</p>
     <div style="display:flex;gap:10px;justify-content:center">
       <button onclick="document.getElementById('modal').style.display='none'" style="background:#2a4a2a;border-color:#2a6a2a;color:#4a8a4a">取消</button>
       <button onclick="document.getElementById('modal').style.display='none';doBackToMenu()" style="background:#5a2020;border-color:#c44;color:#faa">确定返回</button>
     </div>`;
  document.getElementById('modal').style.display='flex';
}
function doBackToMenu(){
  document.getElementById('gameUI').style.display='none';
  document.getElementById('mainMenu').style.display='block';
  document.getElementById('menuMain').style.display='flex';
  document.getElementById('menuAi').style.display='none';
  document.getElementById('mobileToolPanel').style.display='none';
  document.getElementById('mobileFireBtn').style.display='none';
  G=null;MC.width=window.innerWidth;MC.height=window.innerHeight;drawMenu();
}
function showModal(t,d){
  document.getElementById('modalBox').innerHTML=`<h2>${t}</h2><p>${d}</p><button onclick="document.getElementById('modal').style.display='none'">确定</button>`;
  document.getElementById('modal').style.display='flex';
}

drawMenu();
</script>
<script>
// ===== 大战场模式 =====
const BB_MS=800,BB_UR=14,BB_CS=28,BB_CM=70,BB_SW=85,BB_SH=20;
const BB_SD='draw',BB_ST='truce',BB_SB='battle';
let BB_G=null;
const BB_CV=document.getElementById('bbCanvas'),BB_CTX=BB_CV.getContext('2d');
BB_CV.width=BB_CV.height=BB_MS;
const BB_SAND=genSandTexture(BB_MS,BB_MS);

const BB_CFG={
  soldier:{hp:10,maxHp:10,atk:5,ammo:5,maxAmmo:5,label:'普通兵',canHitAir:true},
  sniper:{hp:5,maxHp:5,atk:20,ammo:2,maxAmmo:2,label:'狙击兵',penetrate:true,canHitVehicle:false},
  engineer:{hp:15,maxHp:15,atk:2,ammo:3,maxAmmo:3,label:'工程兵',canBuild:true,canHealVehicle:true},
  doctor:{hp:10,maxHp:10,atk:2,ammo:3,maxAmmo:3,label:'医生',canHeal:true,canHitVehicle:false},
  cannon:{hp:15,maxHp:15,atk:20,ammo:1,maxAmmo:1,label:'大炮',needsOperator:true,bypassWall:true,cantHitAir:true,range:BB_CM*3},
  mine:{hp:Infinity,maxHp:Infinity,atk:10,label:'地雷',triggerRange:BB_CM*2},
  wall:{hp:3,maxHp:3,label:'掩体'},
  camp:{hp:200,maxHp:200,label:'营地',immuneToUnits:true},
  tank:{hp:60,maxHp:60,atk:20,ammo:3,maxAmmo:3,label:'坦克',cost:5},
  car:{hp:30,maxHp:30,atk:15,ammo:2,maxAmmo:2,label:'车',cost:2,canPlaceMine:true},
  jet:{hp:30,maxHp:30,atk:30,ammo:2,maxAmmo:2,label:'战斗机',cost:4,air:true,flare:true},
  heli:{hp:20,maxHp:20,atk:15,ammo:2,maxAmmo:2,label:'直升机',cost:3,air:true,immuneToSniperDoctor:true},
  bomber:{hp:25,maxHp:25,atk:30,ammo:1,maxAmmo:1,label:'轰炸机',cost:25,air:true},
  carrier:{hp:70,maxHp:70,atk:10,ammo:2,maxAmmo:2,label:'航母',cost:10,sea:true},
  ship:{hp:60,maxHp:60,atk:20,ammo:2,maxAmmo:2,label:'战舰',cost:5,sea:true},
};

function bbGetUnitImgKey(u){
  const t=u.team==='red'?'red':'blue';
  if(u.type==='soldier'){const f=u.bulletsFired||0;return f>0?'bb_soldier_'+t+'_'+f:'bb_soldier_'+t;}
  if(u.type==='sniper'){const f=u.bulletsFired||0;return f>0?'bb_sniper_'+t+'_'+f:'bb_sniper_'+t;}
  const map={engineer:'bb_engineer_'+t,doctor:'bb_doctor_'+t,cannon:'bb_cannon_'+t,mine:'bb_mine_'+t,tank:'bb_tank_'+t,car:'bb_car_'+t,jet:'bb_jet_'+t,heli:'bb_heli_'+t,camp:'bb_camp_'+t,bomber:'bb_bomber_'+t,carrier:'bb_carrier_'+t,ship:'bb_ship_'+t};
  if(u.type==='wall'){if(u.team==='black')return'bb_wall_black';return'bb_wall_'+t;}
  return map[u.type]||null;
}
function bbDrawImg(ctx,key,x,y,angle,scale){
  const img=IMG_CACHE[key];if(!img||!img.complete||img.naturalWidth===0)return false;
  const ds=key.startsWith('bb_camp')?0.22:(key.startsWith('bb_wall')?0.22:0.14);
  const s=scale||ds,w=img.naturalWidth*s,h=img.naturalHeight*s;
  ctx.save();ctx.translate(x,y);
  if(angle!==undefined&&angle!==null){
    if(key.startsWith('bb_soldier')||key.startsWith('bb_sniper')){ctx.rotate(angle);}
    else if(key.startsWith('bb_tank')||key.startsWith('bb_car')||key.startsWith('bb_jet')||key.startsWith('bb_heli')||key.startsWith('bb_cannon')||key.startsWith('bb_bomber')||key.startsWith('bb_carrier')||key.startsWith('bb_ship')){ctx.rotate(angle-Math.PI/2);}
    else if(key.startsWith('bb_wall')){ctx.rotate(angle-Math.PI/2);}
  }
  ctx.drawImage(img,-w/2,-h/2,w,h);ctx.restore();return true;
}

function openBigBattle(){
  loadImages().then(function(){
    document.getElementById('mainMenu').style.display='none';
    document.getElementById('gameUI').style.display='none';
    document.getElementById('bigBattleUI').style.display='block';
    // 隐藏战术模式移动端按钮，显示大战场移动端按钮
    document.getElementById('mobileToolBtn').style.display='none';
    document.getElementById('mobileFireBtn').style.display='none';
    document.getElementById('mobileToolPanel').style.display='none';
    bbInitGame();
  });
}
function closeBigBattle(){
  document.getElementById('bigBattleUI').style.display='none';
  document.getElementById('mainMenu').style.display='block';
  document.getElementById('menuMain').style.display='flex';
  document.getElementById('menuAi').style.display='none';
  // 恢复战术模式移动端按钮
  if(window.innerWidth<600){
    document.getElementById('mobileToolBtn').style.display='block';
  }
  document.getElementById('bbMobileToolBtn').style.display='none';
  document.getElementById('bbMobileToolPanel').style.display='none';
  document.getElementById('bbDrivePad').style.display='none';
  bbDestroy();
}
function backToMenuBB(){
  document.getElementById('modalBox').innerHTML='<h2>返回菜单</h2><p>返回菜单将丢失当前进度，确定返回？</p><div style="display:flex;gap:10px;justify-content:center"><button onclick="document.getElementById(\'modal\').style.display=\'none\'" style="background:#2a4a2a;border-color:#2a6a2a;color:#4a8a4a">取消</button><button onclick="document.getElementById(\'modal\').style.display=\'none\';closeBigBattle()" style="background:#5a2020;border-color:#c44;color:#faa">确定返回</button></div>';
  document.getElementById('modal').style.display='flex';
}

function bbInitGame(){
  var aiMode=BB_G&&BB_G.aiMode?true:false;
  BB_G={
    state:BB_SD,turn:0,phase:'red',step:0,maxStep:1,
    units:[],camps:{red:null,blue:null},shelters:[],
    selU:null,selT:null,buildWall:false,builder:null,
    aimMode:false,selCannon:false,selCannonU:null,
    healMode:false,healer:null,carMineMode:false,carMineU:null,
    killCoins:{red:0,blue:0},
    seaLine:null,seaFilled:false,
    sa:0,pa:0,mx:0,my:0,over:false,
    animBullets:[],animExplosions:[],animId:null,
    aiMode:aiMode,
  };
  bbHideAngleKnob();bbHideCancelBtn();
  bbResizeCanvas();bbUpdUI();bbDraw();bbStartAnim();
}
function bbResizeCanvas(){
  var isSmall=window.innerWidth<600;
  var topH=isSmall?36:44,botH=isSmall?32:36;
  var tw=window.innerWidth,th=window.innerHeight-topH-botH;
  var s=Math.min(tw,th,BB_MS);
  BB_CV.style.width=s+'px';BB_CV.style.height=s+'px';
  BB_CV.style.position='absolute';
  BB_CV.style.left=((window.innerWidth-s)/2)+'px';
  BB_CV.style.top=(topH+(th-s)/2)+'px';
  BB_CV.style.pointerEvents='auto';
  document.getElementById('bbToolPanel').style.display=isSmall?'none':'block';
  document.getElementById('bbMobileToolBtn').style.display=isSmall?'block':'none';
}
window.addEventListener('resize',function(){if(BB_G)bbResizeCanvas();});

// ===== DRAW =====
function bbDraw(){
  if(!BB_G)return;
  BB_CTX.clearRect(0,0,BB_MS,BB_MS);
  BB_CTX.drawImage(BB_SAND,0,0,BB_MS,BB_MS);
  BB_CTX.strokeStyle='rgba(60,80,40,0.15)';BB_CTX.lineWidth=0.5;
  for(var i=0;i<=BB_MS;i+=50){BB_CTX.beginPath();BB_CTX.moveTo(i,0);BB_CTX.lineTo(i,BB_MS);BB_CTX.stroke();BB_CTX.beginPath();BB_CTX.moveTo(0,i);BB_CTX.lineTo(BB_MS,i);BB_CTX.stroke();}
  bbDrawSea();
  bbDrawShelters();
  bbDrawCamps();
  bbDrawUnits();
  bbDrawWalls();
  bbDrawSel();
  bbDrawAimPrev();
  bbDrawPlacePrev();
  bbDrawTrap();
  bbDrawCannonPrev();
  bbDrawBomberLinePrev();
  bbDrawAnim();
}
function bbDrawSea(){
  if(!BB_G)return;
  BB_CTX.save();
  var sl=BB_G.seaLine;
  var livePath=BB_G._seaDrawing?BB_G.seaPath:null;
  var drawPath=sl?sl.path:livePath;
  if(drawPath&&drawPath.length>=2){
    // 先画海洋填充(更深的蓝色)
    if(sl&&sl.seaSide){
      BB_CTX.fillStyle='rgba(8,50,140,0.55)';
      BB_CTX.beginPath();
      if(sl.seaSide==='top'){
        BB_CTX.moveTo(0,0);BB_CTX.lineTo(BB_MS,0);
        for(var i=drawPath.length-1;i>=0;i--)BB_CTX.lineTo(drawPath[i].x,drawPath[i].y);
      }else if(sl.seaSide==='bottom'){
        BB_CTX.moveTo(0,BB_MS);BB_CTX.lineTo(BB_MS,BB_MS);
        for(var i=drawPath.length-1;i>=0;i--)BB_CTX.lineTo(drawPath[i].x,drawPath[i].y);
      }else if(sl.seaSide==='left'){
        BB_CTX.moveTo(0,0);BB_CTX.lineTo(0,BB_MS);
        for(var i=drawPath.length-1;i>=0;i--)BB_CTX.lineTo(drawPath[i].x,drawPath[i].y);
      }else{
        BB_CTX.moveTo(BB_MS,0);BB_CTX.lineTo(BB_MS,BB_MS);
        for(var i=drawPath.length-1;i>=0;i--)BB_CTX.lineTo(drawPath[i].x,drawPath[i].y);
      }
      BB_CTX.closePath();BB_CTX.fill();
      // 加上海浪纹理
      BB_CTX.fillStyle='rgba(20,80,180,0.15)';
      BB_CTX.beginPath();
      for(var i=0;i<drawPath.length-1;i++){
        var mx=(drawPath[i].x+drawPath[i+1].x)/2;
        var my=(drawPath[i].y+drawPath[i+1].y)/2;
        var ddx=drawPath[i+1].x-drawPath[i].x;
        var ddy=drawPath[i+1].y-drawPath[i].y;
        var dl=Math.sqrt(ddx*ddx+ddy*ddy);
        if(dl>0){var n=-ddy/dl*8;BB_CTX.moveTo(mx+n,my+ddx/dl*8);BB_CTX.lineTo(mx-n,my-ddx/dl*8);}
      }
      BB_CTX.strokeStyle='rgba(40,120,220,0.2)';BB_CTX.lineWidth=1;
      BB_CTX.stroke();
    }
    // 绘制分界线
    BB_CTX.strokeStyle='rgba(50,150,240,0.9)';BB_CTX.lineWidth=2.5;
    BB_CTX.shadowColor='rgba(30,100,200,0.6)';BB_CTX.shadowBlur=6;
    BB_CTX.setLineDash(livePath?[4,4]:[8,4]);
    BB_CTX.beginPath();
    BB_CTX.moveTo(drawPath[0].x,drawPath[0].y);
    for(var i=1;i<drawPath.length;i++)BB_CTX.lineTo(drawPath[i].x,drawPath[i].y);
    BB_CTX.stroke();BB_CTX.setLineDash([]);
    BB_CTX.shadowBlur=0;
  }
  BB_CTX.restore();
}
function bbDrawShelters(){
  if(!BB_G||!BB_G.shelters)return;
  for(var i=0;i<BB_G.shelters.length;i++){
    var s=BB_G.shelters[i];
    if(!bbDrawImg(BB_CTX,'bb_wall_black',s.x+BB_SW/2,s.y+BB_SH/2,s.angle||0)){
      BB_CTX.save();BB_CTX.translate(s.x+BB_SW/2,s.y+BB_SH/2);BB_CTX.rotate((s.angle||0)-Math.PI/2);
      BB_CTX.fillStyle='#5a4a30';BB_CTX.strokeStyle='#7a6a4a';BB_CTX.lineWidth=2;
      rRect(BB_CTX,-BB_SW/2,-BB_SH/2,BB_SW,BB_SH,3);BB_CTX.fill();BB_CTX.stroke();
      BB_CTX.fillStyle='#4a3a20';
      for(var ii=-BB_SW/2+4;ii<BB_SW/2-4;ii+=10)BB_CTX.fillRect(ii,-BB_SH/2+3,6,BB_SH-6);
      BB_CTX.restore();
    }
  }
}
function bbDrawCamps(){
  if(!BB_G||!BB_G.camps)return;
  ['red','blue'].forEach(function(t){
    var c=BB_G.camps[t];if(!c||c.eliminated)return;
    var cx=c.x,cy=c.y,key='bb_camp_'+t;
    if(!bbDrawImg(BB_CTX,key,cx,cy,0)){
      BB_CTX.save();
      BB_CTX.fillStyle=t==='red'?'#5a2020':'#20305a';
      BB_CTX.strokeStyle=t==='red'?'#a44':'#48f';BB_CTX.lineWidth=2;
      BB_CTX.fillRect(cx-BB_CS,cy-BB_CS+5,BB_CS*2,BB_CS*2-5);
      BB_CTX.strokeRect(cx-BB_CS,cy-BB_CS+5,BB_CS*2,BB_CS*2-5);
      BB_CTX.restore();
    }
    BB_CTX.fillStyle='#fff';BB_CTX.font='bold 14px "Courier New"';
    BB_CTX.textAlign='center';BB_CTX.textBaseline='middle';
    BB_CTX.fillText('HP'+c.hp,cx,cy+BB_CS+12);
  });
}
function bbDrawUnits(){
  if(!BB_G)return;
  for(var i=0;i<BB_G.units.length;i++){
    var u=BB_G.units[i];
    if(u.eliminated||u.trapped)continue;
    if(u.type==='wall')continue;
    BB_CTX.save();BB_CTX.translate(u.x,u.y);
    if(BB_G.selU===u){
      BB_CTX.strokeStyle='#c8a96e';BB_CTX.lineWidth=1.5;BB_CTX.setLineDash([3,3]);
      BB_CTX.beginPath();BB_CTX.arc(0,0,BB_UR+5,0,Math.PI*2);BB_CTX.stroke();BB_CTX.setLineDash([]);
    }
    if(u.air){
      BB_CTX.fillStyle='rgba(0,0,0,0.2)';
      BB_CTX.beginPath();BB_CTX.ellipse(0,BB_UR+8,BB_UR,BB_UR*0.4,0,0,Math.PI*2);BB_CTX.fill();
    }
    var imgKey=bbGetUnitImgKey(u);
    if(imgKey)bbDrawImg(BB_CTX,imgKey,0,0,u.facing);
    if(u.type!=='wall'&&u.type!=='mine'){
      BB_CTX.fillStyle='#fff';BB_CTX.font='bold 9px "Courier New"';
      BB_CTX.textAlign='center';BB_CTX.textBaseline='middle';
      BB_CTX.fillText(''+u.hp,0,BB_UR+10);
    }
    if(u.air){
      BB_CTX.fillStyle='#fff';BB_CTX.font='8px "Courier New"';BB_CTX.textAlign='center';
      BB_CTX.fillText('H:'+(u.altitude||50),0,-BB_UR-10);
    }
    BB_CTX.restore();
  }
  for(var i=0;i<BB_G.units.length;i++){
    var u=BB_G.units[i];
    if(u.eliminated||!u.trapped)continue;
    if(u.type==='wall')continue;
    BB_CTX.save();BB_CTX.globalAlpha=0.4;BB_CTX.translate(u.x,u.y);
    var imgKey=bbGetUnitImgKey(u);
    if(imgKey&&IMG_CACHE[imgKey]&&IMG_CACHE[imgKey].complete)bbDrawImg(BB_CTX,imgKey,0,0,u.facing);
    BB_CTX.restore();
  }
}
function bbDrawWalls(){
  if(!BB_G)return;
  for(var i=0;i<BB_G.units.length;i++){
    var u=BB_G.units[i];
    if(u.type!=='wall'||u.eliminated)continue;
    var key=u.team==='red'?'bb_wall_red':(u.team==='blue'?'bb_wall_blue':'bb_wall_black');
    if(!bbDrawImg(BB_CTX,key,u.x,u.y,u.facing||0)){
      BB_CTX.save();BB_CTX.translate(u.x,u.y);BB_CTX.rotate((u.facing||0)-Math.PI/2);
      var wc=u.team==='red'?'#8a4030':(u.team==='blue'?'#304080':'#6a5a40');
      BB_CTX.fillStyle=wc;BB_CTX.strokeStyle='#aaa';BB_CTX.lineWidth=1.5;
      var w=u.w||50,h=u.h||6;rRect(BB_CTX,-w/2,-h/2,w,h,2);BB_CTX.fill();BB_CTX.stroke();
      BB_CTX.restore();
    }
    BB_CTX.fillStyle='#fff';BB_CTX.font='8px "Courier New"';BB_CTX.textAlign='center';BB_CTX.textBaseline='middle';
    BB_CTX.fillText(u.maxHp>99?'inf':'H'+u.hp,u.x,u.y-(u.h||6)/2-4);
  }
}
function bbDrawSel(){
  var u=BB_G.selU;if(!u||u.eliminated)return;
  BB_CTX.save();
  BB_CTX.strokeStyle='rgba(200,169,110,0.4)';BB_CTX.lineWidth=1.5;BB_CTX.setLineDash([4,4]);
  BB_CTX.beginPath();BB_CTX.arc(u.x,u.y,BB_CM*3,0,Math.PI*2);BB_CTX.stroke();BB_CTX.setLineDash([]);
  BB_CTX.restore();
}
function bbDrawAimPrev(){
  var u=BB_G.selU;if(!u||u.eliminated||!BB_G.aimMode)return;
  var rg=Math.PI*2,fa=0;
  BB_CTX.save();
  BB_CTX.fillStyle='rgba(200,169,110,0.08)';BB_CTX.strokeStyle='rgba(200,169,110,0.3)';BB_CTX.lineWidth=1;
  BB_CTX.beginPath();BB_CTX.moveTo(u.x,u.y);BB_CTX.arc(u.x,u.y,600,0,Math.PI*2);BB_CTX.closePath();BB_CTX.fill();BB_CTX.stroke();
  var dx=BB_G.mx-u.x,dy=BB_G.my-u.y,ma=Math.atan2(dy,dx);
  BB_CTX.strokeStyle='rgba(200,50,50,0.6)';BB_CTX.lineWidth=1.5;BB_CTX.setLineDash([5,4]);
  BB_CTX.beginPath();BB_CTX.moveTo(u.x,u.y);BB_CTX.lineTo(BB_G.mx,BB_G.my);BB_CTX.stroke();BB_CTX.setLineDash([]);
  BB_CTX.fillStyle='#c44';BB_CTX.font='11px "Courier New"';BB_CTX.textAlign='center';BB_CTX.textBaseline='middle';
  BB_CTX.fillText('shoot',BB_G.mx,BB_G.my-8);
  BB_CTX.restore();
}
function bbDrawPlacePrev(){
  if(BB_G.buildWall&&BB_G.builder&&!BB_G.builder.eliminated){
    var mx=BB_G.mx,my=BB_G.my;
    if(mx>=0&&mx<=BB_MS&&my>=0&&my<=BB_MS){
      var a=BB_G.pa||0;
      BB_CTX.save();BB_CTX.globalAlpha=0.35;
      var key=BB_G.builder.team==='red'?'bb_wall_red':'bb_wall_blue';
      if(!bbDrawImg(BB_CTX,key,mx,my,a)){
        BB_CTX.save();BB_CTX.translate(mx,my);BB_CTX.rotate(a-Math.PI/2);
        BB_CTX.fillStyle='#6a5a40';BB_CTX.strokeStyle='#aaa';BB_CTX.lineWidth=1.5;
        rRect(BB_CTX,-25,-3,50,6,2);BB_CTX.fill();BB_CTX.stroke();BB_CTX.restore();
      }
      BB_CTX.restore();
    }
    return;
  }
  if(!BB_G.selT)return;
  var t=BB_G.selT,mx=BB_G.mx,my=BB_G.my;
  if(mx<0||mx>BB_MS||my<0||my>BB_MS)return;
  BB_CTX.save();BB_CTX.globalAlpha=0.35;
  if(t==='shelter'){
    var ang=(BB_G.sa||0)-Math.PI/2;
    BB_CTX.translate(mx,my);BB_CTX.rotate(ang);
    BB_CTX.fillStyle='#5a4a30';BB_CTX.strokeStyle='#7a6a4a';BB_CTX.lineWidth=2;
    rRect(BB_CTX,-BB_SW/2,-BB_SH/2,BB_SW,BB_SH,3);BB_CTX.fill();BB_CTX.stroke();
  }else if(t==='camp_red'||t==='camp_blue'){

var BB_STICK_STATE={active:false,startX:0,startY:0,knob:null,base:null,dx:0,dy:0,interval:null};
function bbInitStick(){
  if(BB_STICK_STATE.knob)return;
  BB_STICK_STATE.knob=document.getElementById('bbStickKnob');
  BB_STICK_STATE.base=document.getElementById('bbStickBase');
  var base=BB_STICK_STATE.base;
  function onStart(e){
    e.preventDefault();e.stopPropagation();
    var p=e.touches?e.touches[0]:e;
    var r=base.getBoundingClientRect();
    BB_STICK_STATE.startX=r.left+r.width/2;
    BB_STICK_STATE.startY=r.top+r.height/2;
    BB_STICK_STATE.active=true;
    bbStickMove(p);
    if(!BB_STICK_STATE.interval)BB_STICK_STATE.interval=setInterval(function(){
      if(BB_STICK_STATE.active&&BB_G&&BB_G._driving){
        var r2=Math.sqrt(BB_STICK_STATE.dx*BB_STICK_STATE.dx+BB_STICK_STATE.dy*BB_STICK_STATE.dy);
        if(r2>10){
          var step=Math.min(r2,55)/55*8;
          var ux=BB_STICK_STATE.dx/r2*step,uy=BB_STICK_STATE.dy/r2*step;
          // 绝对方向映射：摇杆偏移直接作为世界移动量
          bbDriveMove(ux,uy,0);
        }
      }
    },30);
  }
  function onMove(e){
    if(!BB_STICK_STATE.active)return;
    e.preventDefault();e.stopPropagation();
    var p=e.touches?e.touches[0]:e;
    bbStickMove(p);
  }
  function onEnd(e){
    if(!BB_STICK_STATE.active)return;
    BB_STICK_STATE.active=false;
    BB_STICK_STATE.dx=0;BB_STICK_STATE.dy=0;
    if(BB_STICK_STATE.knob){BB_STICK_STATE.knob.style.left='50%';BB_STICK_STATE.knob.style.top='50%';}
  }
  function bbStickMove(p){
    var dx=p.clientX-BB_STICK_STATE.startX,dy=p.clientY-BB_STICK_STATE.startY;
    var r=Math.sqrt(dx*dx+dy*dy);
    var maxR=55;
    if(r>maxR){dx=dx/r*maxR;dy=dy/r*maxR;r=maxR;}
    BB_STICK_STATE.dx=dx;BB_STICK_STATE.dy=dy;
    if(BB_STICK_STATE.knob){
      BB_STICK_STATE.knob.style.left=(65+dx)+'px';
      BB_STICK_STATE.knob.style.top=(65+dy)+'px';
    }
  }
  base.addEventListener('touchstart',onStart,{passive:false});
  base.addEventListener('touchmove',onMove,{passive:false});
  base.addEventListener('touchend',onEnd);
  base.addEventListener('touchcancel',onEnd);
  base.addEventListener('mousedown',onStart);
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onEnd);
}
function bbShowDrivePad(){
  if(window.innerWidth>=600)return;

BB_CV.addEventListener('mouseup',function(e){
  if(!BB_G)return;
  if(BB_G._seaDrawing){
    BB_G._seaDrawing=false;
    if(BB_G.seaPath&&BB_G.seaPath.length>=2){
      // 创建带路径的 seaLine
      var path=BB_G.seaPath;
      // 计算两端延伸到地图边缘
      var first=path[0],last=path[path.length-1];
      var dx=last.x-first.x,dy=last.y-first.y;
      var len=Math.sqrt(dx*dx+dy*dy);
      if(len>0){
        var ux=dx/len,uy=dy/len;
        // 延伸至地图边缘
        function extendLine(p,dx,dy){
          // 从p开始沿(dx,dy)方向延伸至地图边界
          if(dx>0){var t=(BB_MS-p.x)/dx;p={x:p.x+dx*t,y:p.y+dy*t};}
          else if(dx<0){var t=-p.x/dx;p={x:p.x+dx*t,y:p.y+dy*t};}
          if(dy>0){var t=(BB_MS-p.y)/dy;p={x:p.x+dx*t,y:p.y+dy*t};}
          else if(dy<0){var t=-p.y/dy;p={x:p.x+dx*t,y:p.y+dy*t};}
          return p;
        }
        var startExt=extendLine(first,-ux,-uy);
        var endExt=extendLine(last,ux,uy);
        // 构建完整路径
        BB_G.seaLine={path:[startExt].concat(path,[endExt]),seaSide:null};
        BB_G.seaFilled=false;
        bbHint('分界线已绘制，请用填充工具选择海洋侧');
      }
    }
    BB_G.seaPath=null;
  }
});
BB_CV.addEventListener('wheel',function(e){
  e.preventDefault();

  var d=e.deltaY>0?0.1:-0.1;
  if(BB_G.selT==='shelter'&&BB_G.state===BB_SD){BB_G.sa=(BB_G.sa||0)+d;bbUpdKnob();}

  else if(BB_G.selT&&BB_G.state!==BB_SD){BB_G.pa=(BB_G.pa||0)+d;bbUpdKnob();}
},{passive:false});

BB_CV.addEventListener('touchstart',function(e){

},{passive:false});
BB_CV.addEventListener('touchmove',function(e){

},{passive:false});
BB_CV.addEventListener('touchend',function(e){

  if(BB_G._driving)return;

  if(BB_G._seaDrawing){

      var path=BB_G.seaPath;

      var dx=last.x-first.x,dy=last.y-first.y;
      var len=Math.sqrt(dx*dx+dy*dy);
      if(len>0){
        var ux=dx/len,uy=dy/len;
        function extLine(p,ddx,ddy){
          if(ddx>0){var t=(BB_MS-p.x)/ddx;return{x:p.x+ddx*t,y:p.y+ddy*t};}
          else if(ddx<0){var t=-p.x/ddx;return{x:p.x+ddx*t,y:p.y+ddy*t};}
          if(ddy>0){var t=(BB_MS-p.y)/ddy;return{x:p.x+ddx*t,y:p.y+ddy*t};}
          else if(ddy<0){var t=-p.y/ddy;return{x:p.x+ddx*t,y:p.y+ddy*t};}
          return p;
        }
        var se=extLine(first,-ux,-uy);
        var ee=extLine(last,ux,uy);
        BB_G.seaLine={path:[se].concat(path,[ee]),seaSide:null};
        BB_G.seaFilled=false;
        bbHint('分界线已绘制，请用填充工具选择海洋侧');

// ===== PLACE =====
function bbPlace(mx,my){
  var t=BB_G.selT;if(!t)return;
  if(BB_G.state===BB_SD){
    if(t==='shelter'){
      BB_G.shelters.push({x:mx-BB_SW/2,y:my-BB_SH/2,w:BB_SW,h:BB_SH,hp:Infinity,angle:BB_G.sa||0});
    }else if(t==='camp_red'){
      if(BB_G.camps.red){bbHint('红方营地已存在');return;}
      BB_G.camps.red={x:mx,y:my,hp:200,maxHp:200,team:'red',type:'camp',label:'钀ュ湴',eliminated:false};
    }else if(t==='camp_blue'){
      if(BB_G.camps.blue){bbHint('蓝方营地已存在');return;}
      BB_G.camps.blue={x:mx,y:my,hp:200,maxHp:200,team:'blue',type:'camp',label:'钀ュ湴',eliminated:false};
    }else if(t==='sea_line'){
      // sea_line 现在由 mousedown/mousemove/mouseup 处理拖动绘制
      return;
    }else if(t==='sea_fill'){
      if(!BB_G.seaLine||!BB_G.seaLine.path){bbHint('请先长按拖动绘制分界线');return;}
      var path=BB_G.seaLine.path;
      // 找到路径上离点击点最近的点
      var minDist=Infinity,nearIdx=0;
      for(var i=0;i<path.length;i++){
        var d=dist({x:mx,y:my},path[i]);
        if(d<minDist){minDist=d;nearIdx=i;}
      }
      var p=path[nearIdx];
      var before=path[Math.max(0,nearIdx-1)];
      var after=path[Math.min(path.length-1,nearIdx+1)];
      var tdx=after.x-before.x,tdy=after.y-before.y;
      var tlen=Math.sqrt(tdx*tdx+tdy*tdy);
      if(tlen>0){tdx/=tlen;tdy/=tlen;}
      // 法线：(-tdy, tdx) 是切线方向的"左侧"法线
      var nx=-tdy,ny=tdx;
      var vx=mx-p.x,vy=my-p.y;
      var dot=vx*nx+vy*ny;
      // dot>0 表示点击在法线方向侧(路径左侧)，dot<0 在右侧
      // 用整体趋势来判断"top/bottom/left/right"
      var totalDx=path[path.length-1].x-path[0].x;
      var totalDy=path[path.length-1].y-path[0].y;
      if(Math.abs(totalDx)>Math.abs(totalDy)){
        // 大致水平方向的路径：上方=top，下方=bottom
        // 路径从左到右时，法线指向上；从右到左时，法线指向下
        if(totalDx>0){BB_G.seaLine.seaSide=dot>0?'top':'bottom';}
        else{BB_G.seaLine.seaSide=dot>0?'bottom':'top';}
      }else{
        // 大致垂直方向的路径：左=left，右=right
        if(totalDy>0){BB_G.seaLine.seaSide=dot>0?'left':'right';}
        else{BB_G.seaLine.seaSide=dot>0?'right':'left';}
      }
      BB_G.seaFilled=true;
      bbHint('海洋已填充');BB_G.selT=null;bbHideAngleKnob();bbHideCancelBtn();
      document.querySelectorAll('.bb-tb').forEach(function(b){b.classList.remove('act');});
      bbUpdUI();return;
    }
    bbHideAngleKnob();bbHideCancelBtn();bbUpdUI();return;
  }
  var _bt=bbParseType(t),_bc=_bt?BB_CFG[_bt]:null;
  if(!_bc||!_bc.air&&!_bc.sea){if(!bbCanPlace({x:mx,y:my})){bbHint('必须在己方营地或单位3cm内');return;}}
  if(_bc&&_bc.sea){if(!bbIsInSea(mx,my)){bbHint('航母和战舰必须建在海里');return;}}
  else if(!_bc||!_bc.air){if(bbIsInSea(mx,my)){bbHint('不能放置在海洋上');return;}}
  if(!_bc||!_bc.air&&!_bc.sea){if(bbOverlap({x:mx,y:my},BB_UR)){bbHint('位置重叠');return;}}
  if(BB_G.step>=1){bbHint('本回合步数已用完');return;}
  var r=t.endsWith('_r'),te=r?'red':'blue',type=bbParseType(t);
  if(!type)return;
  var cfg=BB_CFG[type];
  if(cfg&&cfg.cost){
    if(BB_G.killCoins[te]<cfg.cost){bbHint('人头币不足！需要 '+cfg.cost);return;}
    BB_G.killCoins[te]-=cfg.cost;bbUpdKillCoins();
  }
  var a=BB_G.pa||0;
  var u=bbMakeUnit(type,te,mx,my,a);
  BB_G.units.push(u);BB_G.step++;BB_G.selT=null;BB_G.pa=0;
  document.querySelectorAll('.bb-tb').forEach(function(b){b.classList.remove('act');});
  bbHideAngleKnob();bbHideCancelBtn();
  bbHint(u.label+' 已放置');bbUpdUI();bbAutoEnd();
}
function bbPlaceWall(mx,my){
  var e=BB_G.builder;
  if(!e||e.eliminated){BB_G.buildWall=false;bbHideAngleKnob();bbHideCancelBtn();return;}
  if(dist(e,{x:mx,y:my})>BB_CM*3){bbHint('必须在工程兵3cm范围内');return;}
  var w=bbMakeUnit('wall',e.team,mx,my,BB_G.pa||0);
  BB_G.units.push(w);BB_G.step++;
  BB_G.buildWall=false;BB_G.builder=null;BB_G.pa=0;
  bbHideAngleKnob();bbHideCancelBtn();
  bbHint('掩体已建造');bbCheckTrap();bbUpdUI();bbAutoEnd();
}
function bbCheckTrap(){
  for(var i=0;i<BB_G.units.length;i++){
    var u=BB_G.units[i];
    if(u.eliminated||u.type==='wall')continue;
    var trapped=false;
    for(var j=0;j<BB_G.units.length;j++){
      var w=BB_G.units[j];
      if(w.type!=='wall'||w.eliminated)continue;
      var dx=u.x-w.x,dy=u.y-w.y,wallAngle=w.facing-Math.PI/2;
      var cs=Math.cos(wallAngle),sn=Math.sin(wallAngle);
      var rx=dx*cs+dy*sn,ry=-dx*sn+dy*cs;
      var ww=w.w||50,hh=w.h||6;
      if(Math.abs(rx)<ww/2+BB_UR-2&&Math.abs(ry)<hh/2+BB_UR-2){trapped=true;break;}
    }
    if(trapped&&!u.trapped){u.trapped=true;}
    else if(!trapped&&u.trapped)u.trapped=false;
  }
}
function bbCanPlace(p){
  var c=BB_G.phase==='red'?BB_G.camps.red:BB_G.camps.blue;
  if(c&&!c.eliminated&&dist(p,c)<=BB_CM*3)return true;
  for(var i=0;i<BB_G.units.length;i++){var u=BB_G.units[i];if(!u.eliminated&&u.team===BB_G.phase&&dist(p,u)<=BB_CM*3)return true;}
  return false;
}
function bbOverlap(p,rr){
  for(var i=0;i<BB_G.units.length;i++){var u=BB_G.units[i];if(!u.eliminated&&dist(p,u)<rr+BB_UR)return true;}
  if(BB_G.camps.red&&!BB_G.camps.red.eliminated&&dist(p,BB_G.camps.red)<rr+BB_CS)return true;
  if(BB_G.camps.blue&&!BB_G.camps.blue.eliminated&&dist(p,BB_G.camps.blue)<rr+BB_CS)return true;
  return false;
}
function bbIsInSea(mx,my){
  // 未填充海洋不算
  if(!BB_G.seaLine||!BB_G.seaLine.seaSide)return false;
  var path=BB_G.seaLine.path;
  if(!path||path.length<2)return false;
  // 使用 ray casting 算法判断点是否在多边形内
  var inside=false;
  for(var i=0,j=path.length-1;i<path.length;j=i++){
    var xi=path[i].x,yi=path[i].y;
    var xj=path[j].x,yj=path[j].y;
    var intersect=((yi>my)!==(yj>my))&&(mx<(xj-xi)*(my-yi)/(yj-yi)+xi);
    if(intersect)inside=!inside;
  }
  return inside;
}

// ===== MAKE UNIT =====
function bbMakeUnit(type,team,x,y,angle){
  var cfg=BB_CFG[type]||{};
  var b={
    id:Date.now()+Math.random(),type:type,team:team,x:x,y:y,
    hp:cfg.hp||1,maxHp:cfg.maxHp||1,
    ammo:cfg.maxAmmo||0,maxAmmo:cfg.maxAmmo||0,
    atk:cfg.atk||0,
    eliminated:false,trapped:false,facing:angle||0,
    bulletsFired:0,reservedCement:0,
    label:cfg.label||type,
    w:type==='wall'?50:40,h:type==='wall'?6:40,
  };
  if(cfg.air){b.air=true;b.altitude=50;}
  if(cfg.sea){b.sea=true;}
  return b;
}

// ===== SELECT/POPUP =====
function bbClickUnit(mx,my){
  var u=BB_G.selU;if(!u||u.eliminated)return;

  if(clicked&&clicked!==u&&clicked.team===BB_G.phase){BB_G.selU=clicked;bbShowCancelBtn();bbShowPopup(clicked,mx,my);return;}
  if(!clicked||clicked.eliminated||clicked.trapped||clicked.team!==BB_G.phase){BB_G.selU=null;bbHideCancelBtn();bbHint('');return;}
  if(clicked===u)bbShowPopup(u,mx,my);
}
function bbTrySel(mx,my){
  var u=bbFindU(mx,my);
  if(u&&!u.eliminated&&!u.trapped&&u.team===BB_G.phase&&BB_G.state!==BB_SD){BB_G.selU=u;bbShowCancelBtn();bbShowPopup(u,mx,my);}
}
function bbFindU(mx,my){
  for(var i=0;i<BB_G.units.length;i++){var u=BB_G.units[i];if(!u.eliminated&&u.type!=='wall'&&u.type!=='mine'&&dist({x:mx,y:my},u)<BB_UR+6)return u;}

function bbClosePop(){document.getElementById('bbUnitPopup').style.display='none';}

// ===== UNIT ACTIONS =====
function bbDoUnit(action){
  bbClosePop();var u=BB_G.selU;if(!u||u.eliminated)return;
  if(action==='fire'){
    if(u.ammo<=0){bbHint('弹药不足');return;}
    if(BB_G.step>=1){bbHint('本回合步数已用完');return;}
    BB_G.aimMode=true;bbShowCancelBtn();
    if(window.innerWidth<600)document.getElementById('bbMobileFireBtn').style.display='block';
    bbHint('拖动瞄准点击射击(360度)');
  }else if(action==='reload'){
    if(BB_G.step>=1){bbHint('本回合步数已用完');return;}
    if(u.ammo>=u.maxAmmo){bbHint('弹药已满');return;}
    u.ammo=u.maxAmmo;u.bulletsFired=0;BB_G.step++;
    bbHint('装弹完成');bbUpdUI();bbAutoEnd();
  }
}
function bbDoAimFire(mx,my){
  var u=BB_G.selU;
  if(!u||u.eliminated||u.ammo<=0){BB_G.aimMode=false;document.getElementById('bbMobileFireBtn').style.display='none';return;}

function pointToSegmentDist(p,a,b){
  var dx=b.x-a.x,dy=b.y-a.y;
  var len2=dx*dx+dy*dy;
  if(len2===0)return dist(p,a);
  var t=((p.x-a.x)*dx+(p.y-a.y)*dy)/len2;
  t=Math.max(0,Math.min(1,t));
  var proj={x:a.x+t*dx,y:a.y+t*dy};
  return dist(p,proj);
}

// ===== FIRE =====
function bbFire(shooter,angle){
  if(!shooter||shooter.eliminated)return;
  if(shooter.trapped){bbHint('单位被困，无法射击');return;}
  if(shooter.ammo<=0){bbHint('弹药不足');return;}
  shooter.ammo--;shooter.bulletsFired=(shooter.bulletsFired||0)+1;BB_G.step++;
  var sx=shooter.x,sy=shooter.y,hitList=[],stop=BB_MS*1.5,pen=0;
  var cfg=BB_CFG[shooter.type];
  var isVehicle=['tank','car','cannon'].indexOf(shooter.type)>=0;
  var isAir=shooter.type==='jet'||shooter.type==='heli';

  for(var d=6;d<BB_MS*1.5;d+=6){
    var px=sx+Math.cos(angle)*d,py=sy+Math.sin(angle)*d;
    if(px<0||px>BB_MS||py<0||py>BB_MS){stop=d;break;}
    // mines
    for(var i=0;i<BB_G.units.length;i++){
      var m=BB_G.units[i];
      if(m.type!=='mine'||m.eliminated)continue;
      if(m.team===shooter.team)continue;
      if(dist({x:px,y:py},m)<(BB_CFG.mine.triggerRange||140))bbDetonateMine(m);
    }
    // walls
    for(var i=0;i<BB_G.units.length;i++){
      var w=BB_G.units[i];
      if(w.type!=='wall'||w.eliminated)continue;
      if(hitList.find(function(h){return h.target===w;}))continue;
      if(dist({x:px,y:py},w)<(w.w||50)/2){
        if(shooter.type==='sniper'&&pen<1){hitList.push({target:w,dmg:Math.floor(cfg.atk/2),dist:d});pen++;break;}
        else{hitList.push({target:w,dmg:cfg.atk,dist:d});stop=d;break;}
      }
    }
    if(stop!==BB_MS*1.5&&shooter.type!=='sniper')break;
    if(pen>=2)break;
    // map shelters
    for(var i=0;i<(BB_G.shelters||[]).length;i++){
      var s=BB_G.shelters[i],cx=px,cy=py;
      if(s.angle){var ox=s.x+BB_SW/2,oy=s.y+BB_SH/2,cs=Math.cos(-s.angle),sn=Math.sin(-s.angle),dx=cx-ox,dy=cy-oy;cx=dx*cs-dy*sn+ox;cy=dx*sn+dy*cs+oy;}
      if(Math.abs(cy-(s.y+BB_SH/2))<BB_SH/2&&Math.abs(cx-(s.x+BB_SW/2))<BB_SW/2){if(shooter.type==='sniper'&&pen<1)pen++;else{stop=d;}break;}
    }
    if(stop!==BB_MS*1.5&&shooter.type!=='sniper')break;
    if(pen>=2)break;
    // units
    for(var i=0;i<BB_G.units.length;i++){
      var u=BB_G.units[i];
      if(u.eliminated||u===shooter||u.type==='wall'||u.type==='mine')continue;
      if(u.trapped)continue;
      if(u.type==='heli'&&(shooter.type==='sniper'||shooter.type==='doctor'))continue;
      if(shooter.type==='sniper'&&['tank','car'].indexOf(u.type)>=0)continue;
      if(shooter.type==='doctor'&&['tank','car','cannon'].indexOf(u.type)>=0)continue;
      if(u.air&&shooter.type!=='soldier')continue;
      if(u.type==='camp'&&['soldier','sniper','doctor','engineer'].indexOf(shooter.type)>=0)continue;
      if(dist({x:px,y:py},u)<BB_UR+6){
        if(!hitList.find(function(h){return h.target===u;})){
          var dmg=cfg.atk;
          if(shooter.type==='sniper'){for(var p=0;p<pen;p++)dmg=Math.max(1,Math.floor(dmg/2));}
          hitList.push({target:u,dmg:dmg,dist:d});
          if(shooter.type!=='sniper'){stop=d;}pen++;break;
        }
      }
    }
    if(stop!==BB_MS*1.5&&shooter.type!=='sniper')break;
    if(pen>=2&&shooter.type==='sniper')break;
    // camps - 只有步兵(普通兵/狙击兵/工程兵/医生)不能攻击营地
    if(['soldier','sniper','doctor','engineer'].indexOf(shooter.type)<0){
      ['red','blue'].forEach(function(t){
        var c=BB_G.camps[t];if(!c||c.eliminated)return;
        if(c.team===shooter.team)return;
        if(dist({x:px,y:py},c)<BB_CS){
          if(!hitList.find(function(h){return h.target===c;})){
            hitList.push({target:c,dmg:cfg.atk,dist:d});stop=d;
          }
        }
      });
    }
    if(stop!==BB_MS*1.5)break;
  }
  BB_G.animBullets.push({sx:sx,sy:sy,angle:angle,stop:stop,startTime:Date.now()});
  setTimeout(function(){
    for(var i=0;i<hitList.length;i++)bbDmgU(hitList[i].target,hitList[i].dmg,shooter);
    bbChkOver();bbUpdUI();bbAutoEnd();
  },200);
  BB_G.selU=null;bbUpdUI();
}
function bbDetonateMine(mine){
  var cfg=BB_CFG.mine;
  for(var i=0;i<BB_G.units.length;i++){
    var u=BB_G.units[i];
    if(u.eliminated||u.team===mine.team||u.type==='camp'||u.type==='wall')continue;
    if(u.air)continue;
    if(dist(u,mine)<cfg.triggerRange)bbDmgU(u,cfg.atk,mine);
  }
  mine.eliminated=true;
  BB_G.animExplosions.push({x:mine.x,y:mine.y,startTime:Date.now(),radius:25});
  bbHint('地雷引爆！');
}
function bbDmgU(u,d,source){
  if(u.eliminated)return;
  if(u.type==='jet'&&source&&source.team!==u.team){if(Math.random()<0.2){bbHint('战斗机干扰弹拦截！');return;}}
  u.hp-=d;
  if(u.hp<=0){
    u.hp=0;u.eliminated=true;
    if(source&&source.team!==u.team&&u.type!=='wall'){
      var coins=1;
      if(u.air)coins=3;
      else if(u.type==='tank'||u.type==='car')coins=2;
      BB_G.killCoins[source.team]=(BB_G.killCoins[source.team]||0)+coins;bbUpdKillCoins();
    }
    if(u.type==='wall')bbCheckTrap();
    if(u.type==='camp'){bbHint((u.team==='red'?'Red':'Blue')+'营地被摧毁！');}
    else{bbHint(u.label+' 被摧毁！');}
  }
}

function bbSwTurn(){
  if(BB_G.over)return;
  if(BB_G.phase==='red')BB_G.phase='blue';
  else{BB_G.phase='red';BB_G.turn++;if(BB_G.turn>3)BB_G.state=BB_SB;}
  BB_G.step=0;BB_G.selU=null;BB_G.selT=null;BB_G.pa=0;BB_G.aimMode=false;
  bbAiRetryCount=0;

  });

var bbAiRetryCount=0;

function bbBuildGameContext(){
  var ctx=[];
  ctx.push('回合'+BB_G.turn+'，阶段:'+(BB_G.state===BB_ST?'休战':'战斗')+'，蓝方回合(AI)');
  ctx.push('坐标系:X右Y下,0-800。1cm='+BB_CM+'像素。射击为360度无射角限制。');
  if(BB_G.camps.red)ctx.push('红方营地:('+Math.round(BB_G.camps.red.x)+','+Math.round(BB_G.camps.red.y)+') HP'+BB_G.camps.red.hp+'/200');
  if(BB_G.camps.blue)ctx.push('蓝方营地:('+Math.round(BB_G.camps.blue.x)+','+Math.round(BB_G.camps.blue.y)+') HP'+BB_G.camps.blue.hp+'/200');
  ctx.push('人头币: 红'+BB_G.killCoins.red+' 蓝'+BB_G.killCoins.blue);

  var bu=BB_G.units.filter(function(u){return!u.eliminated&&u.team==='blue'&&u.type!=='wall'&&u.type!=='mine';});
  var ru=BB_G.units.filter(function(u){return!u.eliminated&&u.team==='red'&&u.type!=='wall'&&u.type!=='mine';});

  if(bu.length)ctx.push('蓝方单位(用unit_index调用,仅这些可控制):\n  '+bu.map(function(u,i){
    var parts=['['+i+']'+u.label+'('+Math.round(u.x)+','+Math.round(u.y)+')HP'+u.hp+'/'+u.maxHp];
    if(u.trapped)parts.push('【被困】');
    if(u.air)parts.push('空中单位');
    if(u.sea)parts.push('海上单位');

    if(['soldier','sniper','doctor','tank','car','jet','heli','bomber','carrier','ship'].indexOf(u.type)>=0){
      parts.push('弹'+u.ammo+'/'+u.maxAmmo);
      if(u.ammo>0){
        var canHit=[];
        for(var j=0;j<ru.length;j++){
          var r=ru[j];
          if(r.air&&!u.type==='soldier')continue;
          if((u.type==='sniper'||u.type==='doctor')&&['tank','car','cannon'].indexOf(r.type)>=0)continue;
          if(u.type==='doctor'&&r.type==='heli')continue;
          canHit.push(r.label+'('+Math.round(r.x)+','+Math.round(r.y)+')HP'+r.hp);
        }
        if(canHit.length)parts.push('可打:'+canHit.join(','));
        // 能打红营?
        var infOnly=['soldier','sniper','doctor','engineer'].indexOf(u.type)>=0;
        if(!infOnly&&BB_G.camps.red&&!BB_G.camps.red.eliminated){
          parts.push('可打红营');
        }
        parts.push('操作:fire(target_x/y)');
      }else{
        parts.push('操作:reload');
      }
    }

    if(u.type==='engineer'){
      parts.push('操作:build_wall(target_x/y,3cm内)/build_cannon(target_x/y,3cm内)/repair(修附近载具)');
    }
    if(u.type==='doctor')parts.push('操作:heal(target_x/y)');
    if(u.type==='cannon'){
      var hasOp=BB_G.units.some(function(s){return!s.eliminated&&s.team==='blue'&&['soldier','sniper','engineer','doctor'].indexOf(s.type)>=0&&dist(s,u)<BB_CM*3;});
      parts.push(hasOp?'操作:fire_cannon(target_x/y,范围伤害,不能打空中)':'需要附近有士兵操控');
    }
    if(u.type==='car')parts.push('操作:car_mine(target_x/y,1cm内)');
    if(u.type==='carrier')parts.push('操作:carrier_deploy(jet或heli)');
    if(u.type==='ship')parts.push('操作:ship_deploy(heli)');
    if(['tank','car','heli','jet','bomber','carrier','ship'].indexOf(u.type)>=0){
      var dm=u.type==='tank'?'2cm':(u.type==='car'?'3cm':(u.type==='jet'||u.type==='bomber'?'4cm':(u.type==='heli'?'3cm':'2cm')));
      parts.push('操作:drive(target_x/y,最多移动'+dm+')');
    }
    return parts.join(' ');
  }).join('\n  '));
  else ctx.push('蓝方尚无可控单位');

  if(ru.length)ctx.push('红方单位:'+ru.map(function(u){
    var p=u.label+'('+Math.round(u.x)+','+Math.round(u.y)+')HP'+u.hp;
    if(u.air)p+='(空中)';
    if(u.sea)p+='(海上)';
    return p;
  }).join('; '));

  // 部署信息
  var deployable=['soldier','sniper','engineer','doctor'];
  var buyable=['tank','car','jet','heli','bomber','carrier','ship'];
  ctx.push('可部署步兵(免费):'+deployable.join(','));
  var buyInfo=buyable.map(function(t){var c=BB_CFG[t];return t+'(cost:'+c.cost+',HP'+c.hp+',ATK'+c.atk+')';}).join(' ');
  ctx.push('可购买载具(需人头币):'+buyInfo);
  ctx.push('部署范围:蓝方营地或蓝方单位周围'+Math.round(BB_CM*3)+'像素(='+Math.round(BB_CM*3/BB_CM)+'cm)内');

  // 建议
  if(BB_G.state===BB_ST){
    ctx.push('休战期:只能部署。优先部署soldier和sniper在蓝方营地附近朝向红方营地');
  }else{
    // 优先级: 有弹可射击的>大炮可开火>需要装弹>驾驶载具接近>部署新单位
    var fireable=bu.filter(function(u){return['soldier','sniper','doctor','tank','car','jet','heli','bomber','carrier','ship'].indexOf(u.type)>=0&&u.ammo>0&&!u.trapped;});
    var cannonReady=bu.filter(function(u){return u.type==='cannon'&&!u.trapped&&BB_G.units.some(function(s){return!s.eliminated&&s.team==='blue'&&['soldier','sniper','engineer','doctor'].indexOf(s.type)>=0&&dist(s,u)<BB_CM*3;});});
    var needReload=bu.filter(function(u){return['soldier','sniper','doctor','tank','car','jet','heli','bomber','carrier','ship'].indexOf(u.type)>=0&&u.ammo===0&&!u.trapped&&u.ammo<u.maxAmmo;});

    if(fireable.length>0&&BB_G.camps.red){
      var f=fireable[0];
      var idx=bu.indexOf(f);
      var infOnly=['soldier','sniper','doctor','engineer'].indexOf(f.type)>=0;
      if(!infOnly){
        ctx.push('建议:control_unit unit_index='+idx+' action=fire target_x='+Math.round(BB_G.camps.red.x)+' target_y='+Math.round(BB_G.camps.red.y)+' 打红营');
      }else if(ru.length>0){
        var tgt=ru[0];
        ctx.push('建议:control_unit unit_index='+idx+' action=fire target_x='+Math.round(tgt.x)+' target_y='+Math.round(tgt.y)+' 打'+tgt.label);
      }else{
        ctx.push('建议:部署新单位');
      }
    }else if(cannonReady.length>0&&BB_G.camps.red){
      ctx.push('建议:control_unit unit_index='+bu.indexOf(cannonReady[0])+' action=fire_cannon target_x='+Math.round(BB_G.camps.red.x)+' target_y='+Math.round(BB_G.camps.red.y)+' 大炮轰红营');
    }else if(needReload.length>0){
      ctx.push('建议:control_unit unit_index='+bu.indexOf(needReload[0])+' action=reload 装弹');
    }else{
      ctx.push('建议:部署新单位或让载具drive接近红方');
    }
  }
  return ctx.join('\n');
}

async function bbAiTurn(){
  if(!BB_G||!BB_G.aiMode||BB_G.phase!=='blue'||BB_G.over)return;
  var context=bbBuildGameContext();
  var extra='';
  if(bbAiRetryCount>0)extra='\n⚠️ 上次操作失败，请换一个合法操作。';

  var messages=[
    {role:'system',content:'你正在玩"核邪部队"大战场模式，作为蓝方指挥官，目标是摧毁红方营地(200HP)获得胜利。\n\n每回合只能执行1个操作（部署1个单位或控制1个单位行动）。\n\n==兵种详解==\nsoldier 普通兵(10HP,5弹,5伤,可打空中): fire射击(360度) / reload装弹\nsniper 狙击兵(5HP,2弹,20伤,可穿1面墙,不能打载具): fire / reload\nengineer 工程兵(15HP,2伤): build_wall建掩体(3cm内) / build_cannon建大炮(3cm内) / repair修附近载具\ndoctor 医生(10HP,2伤,不能打载具/直升机): fire射击 / heal治疗队友(满血)\ncannon 大炮(15HP,20伤范围伤害,不能打空中,需附近有步兵操控): fire_cannon\ntank 坦克(60HP,3弹,20伤,cost5): fire / drive移动(2cm)\ncar 车(30HP,2弹,15伤,cost2): fire / drive(3cm) / car_mine放地雷\njet 战斗机(30HP,2弹,30伤,空中,cost4): fire / drive(4cm) 有50%干扰弹\nheli 直升机(20HP,2弹,15伤,空中,cost3): fire / drive(3cm)\nbomber 轰炸机(25HP,1弹,30伤,空中,cost25): fire / drive(4cm)\ncarrier 航母(70HP,2弹,10伤,海上,cost10): fire / carrier_deploy部署jet或heli / drive(2cm)\nship 战舰(60HP,2弹,20伤,海上,cost5): fire / ship_deploy部署heli / drive(2cm)\n\n坐标系:X右Y下,0-800。1cm='+BB_CM+'像素。射击为360度无射角限制。\n\n休战期(前3回合):只能部署。优先部署soldier和sniper在蓝方营地附近。\n战斗期(第4回合起):优先攻击红方营地或红方单位。弹尽装弹。载具可drive接近目标。'},
    {role:'user',content:context+extra}
  ];

  console.log('=== BB AI CONTEXT ===');console.log(context);

  try{
    bbHint('AI思考中...');
    var resp=await fetch(AI_API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+AI_API_KEY},
      body:JSON.stringify({model:AI_MODEL,messages:messages,tools:BB_AI_TOOLS,tool_choice:'required',temperature:0.6,max_tokens:400})
    });
    var data=await resp.json();
    console.log('=== BB AI RAW ===');console.log(JSON.stringify(data).slice(0,500));

    var msg=data.choices&&data.choices[0]&&data.choices[0].message;
    if(!msg){bbHint('AI无响应');bbSwTurn();return;}

    if(msg.tool_calls&&msg.tool_calls.length>0){
      var tc=msg.tool_calls[0];
      var fn=tc.function;
      console.log('BB AI调用工具:',fn.name,fn.arguments);
      var args=JSON.parse(fn.arguments);
      bbExecAiTool(fn.name,args);
    }else{
      bbAiRetryCount++;
      if(bbAiRetryCount<5){console.log('BB AI: no tool_call, retry');setTimeout(function(){bbAiTurn();},200);return;}
      bbSwTurn();
    }
  }catch(e){
    console.error('BB AI error:',e);
    bbAiRetryCount++;
    if(bbAiRetryCount<5){setTimeout(function(){bbAiTurn();},500);return;}
    bbHint('AI出错');setTimeout(function(){bbSwTurn();},500);
  }
}

function bbExecAiTool(name,args){
  console.log('bbExecAiTool:',name,args);
  if(name==='deploy_unit'){
    var type=args.unit_type;
    var cfg=BB_CFG[type];
    if(!cfg){bbAiRetryCount++;if(bbAiRetryCount<5){setTimeout(function(){bbAiTurn();},200);return;}bbSwTurn();return;}

    // 检查cost
    if(cfg.cost&&BB_G.killCoins.blue<cfg.cost){bbHint('人头币不足！需要'+cfg.cost);bbAiRetryCount++;if(bbAiRetryCount<5){setTimeout(function(){bbAiTurn();},200);return;}bbSwTurn();return;}

    // 位置修正：必须在蓝方营地或蓝方单位3cm内
    var ox=args.x,oy=args.y;
    if(ox===undefined||oy===undefined){ox=BB_G.camps.blue?BB_G.camps.blue.x:400;oy=BB_G.camps.blue?BB_G.camps.blue.y:400;}
    var bc=BB_G.camps.blue;
    var bases=[];
    if(bc)bases.push(bc);
    for(var i=0;i<BB_G.units.length;i++)if(!BB_G.units[i].eliminated&&BB_G.units[i].team==='blue'&&BB_G.units[i].type!=='wall'&&BB_G.units[i].type!=='mine')bases.push(BB_G.units[i]);

    var bestX=null,bestY=null;
    for(var attempt=0;attempt<100;attempt++){
      var tx,ty;
      if(attempt===0){tx=ox;ty=oy;}
      else{
        var base=bases[Math.floor(Math.random()*bases.length)];
        var ang=Math.random()*Math.PI*2;
        var r=Math.random()*BB_CM*2.5+BB_CM*0.5;
        tx=base.x+Math.cos(ang)*r;
        ty=base.y+Math.sin(ang)*r;
      }
      tx=Math.max(BB_UR,Math.min(BB_MS-BB_UR,tx));
      ty=Math.max(BB_UR,Math.min(BB_MS-BB_UR,ty));
      var p={x:tx,y:ty};
      var ok=true,inR=false;
      for(var b=0;b<bases.length;b++){if(dist(p,bases[b])<=BB_CM*3){inR=true;break;}}
      if(!inR)continue;
      if(!cfg.air&&!cfg.sea){
        if(bbIsInSea(tx,ty))continue;
        if(bbOverlap(p,BB_UR)){ok=false;}
      }
      if(ok){bestX=tx;bestY=ty;break;}
    }
    if(bestX===null){
      var camp=bc||bases[0]||{x:400,y:400};
      bestX=camp.x+(Math.random()-0.5)*BB_CM*2;
      bestY=camp.y+(Math.random()-0.5)*BB_CM*2;
      bestX=Math.max(BB_UR,Math.min(BB_MS-BB_UR,bestX));
      bestY=Math.max(BB_UR,Math.min(BB_MS-BB_UR,bestY));
    }

    // facing: AI给的度数(0=上)转弧度
    var facing=(args.facing||0)*Math.PI/180;
    // 如果有红方营地且未给facing，朝向红方营地
    if(args.facing===undefined&&BB_G.camps.red){
      var ra=Math.atan2(BB_G.camps.red.y-bestY,BB_G.camps.red.x-bestX);
      facing=ra+Math.PI/2;
    }

    var u=bbMakeUnit(type,'blue',bestX,bestY,facing);
    if(cfg.cost){BB_G.killCoins.blue-=cfg.cost;bbUpdKillCoins();}
    BB_G.units.push(u);BB_G.step++;bbAiRetryCount=0;
    bbHint('AI部署了'+cfg.label);bbUpdUI();bbAutoEnd();
  }
  else if(name==='control_unit'){
    var bu=BB_G.units.filter(function(u){return!u.eliminated&&u.team==='blue'&&u.type!=='wall'&&u.type!=='mine';});
    var uIdx=parseInt(args.unit_index);
    var u=bu[uIdx];
    if(!u){console.log('BB AI: unit not found, idx=',uIdx);bbAiRetryCount++;if(bbAiRetryCount<5){setTimeout(function(){bbAiTurn();},200);return;}bbSwTurn();return;}
    if(u.trapped){console.log('BB AI: unit trapped');bbAiRetryCount++;if(bbAiRetryCount<5){setTimeout(function(){bbAiTurn();},200);return;}bbSwTurn();return;}
    if(BB_G.step>=1){bbHint('本回合步数已用完');bbAiRetryCount++;if(bbAiRetryCount<5){setTimeout(function(){bbAiTurn();},200);return;}bbSwTurn();return;}

    BB_G.selU=u;
    var action=args.action;

    if(action==='fire'){
      if(u.ammo<=0){bbAiRetryCount++;if(bbAiRetryCount<5){setTimeout(function(){bbAiTurn();},200);return;}bbSwTurn();return;}
      var tx=args.target_x!==undefined?args.target_x:(BB_G.camps.red?BB_G.camps.red.x:400);
      var ty=args.target_y!==undefined?args.target_y:(BB_G.camps.red?BB_G.camps.red.y:400);
      var a=Math.atan2(ty-u.y,tx-u.x);
      bbAiRetryCount=0;
      bbFire(u,a);
    }
    else if(action==='reload'){
      if(u.ammo>=u.maxAmmo){bbAiRetryCount++;if(bbAiRetryCount<5){setTimeout(function(){bbAiTurn();},200);return;}bbSwTurn();return;}
      u.ammo=u.maxAmmo;u.bulletsFired=0;BB_G.step++;bbAiRetryCount=0;
      bbHint('AI装弹');bbUpdUI();bbAutoEnd();
    }
    else if(action==='build_wall'){
      if(u.type!=='engineer'){bbAiRetryCount++;if(bbAiRetryCount<5){setTimeout(function(){bbAiTurn();},200);return;}bbSwTurn();return;}
      var wx=args.target_x!==undefined?args.target_x:u.x+50;
      var wy=args.target_y!==undefined?args.target_y:u.y;
      // 确保在工程兵3cm内
      if(dist(u,{x:wx,y:wy})>BB_CM*3){
        var dx=wx-u.x,dy=wy-u.y,len=Math.sqrt(dx*dx+dy*dy)||1;
        wx=u.x+dx/len*BB_CM*2.5;wy=u.y+dy/len*BB_CM*2.5;
      }
      var wall=bbMakeUnit('wall','blue',wx,wy,0);
      BB_G.units.push(wall);BB_G.step++;bbAiRetryCount=0;
      bbHint('AI建造掩体');bbCheckTrap();bbUpdUI();bbAutoEnd();
    }
    else if(action==='build_cannon'){
      if(u.type!=='engineer'){bbAiRetryCount++;if(bbAiRetryCount<5){setTimeout(function(){bbAiTurn();},200);return;}bbSwTurn();return;}
      var cx=args.target_x!==undefined?args.target_x:u.x+50;
      var cy=args.target_y!==undefined?args.target_y:u.y;
      if(dist(u,{x:cx,y:cy})>BB_CM*3){
        var ddx=cx-u.x,ddy=cy-u.y,ll=Math.sqrt(ddx*ddx+ddy*ddy)||1;
        cx=u.x+ddx/ll*BB_CM*2.5;cy=u.y+ddy/ll*BB_CM*2.5;
      }
      if(bbOverlap({x:cx,y:cy},BB_UR)){
        cx=u.x+(Math.random()-0.5)*BB_CM*2;cy=u.y+(Math.random()-0.5)*BB_CM*2;
      }
      var cannon=bbMakeUnit('cannon','blue',cx,cy,0);
      BB_G.units.push(cannon);BB_G.step++;bbAiRetryCount=0;
      bbHint('AI建造大炮');bbUpdUI();bbAutoEnd();
    }
    else if(action==='repair'){
      if(u.type!=='engineer'){bbAiRetryCount++;if(bbAiRetryCount<5){setTimeout(function(){bbAiTurn();},200);return;}bbSwTurn();return;}
      var targets=BB_G.units.filter(function(t){return!t.eliminated&&t.team==='blue'&&['tank','car','cannon'].indexOf(t.type)>=0&&dist(t,u)<=BB_CM*3;});
      if(targets.length===0){bbAiRetryCount++;if(bbAiRetryCount<5){setTimeout(function(){bbAiTurn();},200);return;}bbSwTurn();return;}
      for(var i=0;i<targets.length;i++)targets[i].hp=targets[i].maxHp;
      BB_G.step++;bbAiRetryCount=0;
      bbHint('AI修理了'+targets.length+'个载具/大炮');bbUpdUI();bbAutoEnd();
    }
    else if(action==='heal'){
      if(u.type!=='doctor'){bbAiRetryCount++;if(bbAiRetryCount<5){setTimeout(function(){bbAiTurn();},200);return;}bbSwTurn();return;}
      var hx=args.target_x!==undefined?args.target_x:u.x;
      var hy=args.target_y!==undefined?args.target_y:u.y;
      var target=bbFindU(hx,hy);
      if(!target||target.team!=='blue'||target===u||target.eliminated){
        // 找最近的受伤蓝方单位
        var wounded=BB_G.units.filter(function(t){return!t.eliminated&&t.team==='blue'&&t!==u&&t.hp<t.maxHp&&t.type!=='wall'&&t.type!=='mine';});
        if(wounded.length>0){
          wounded.sort(function(a,b){return dist(a,u)-dist(b,u);});
          target=wounded[0];
        }
      }
      if(target&&target.team==='blue'&&target!==u&&!target.eliminated){
        target.hp=target.maxHp;u.hp=Math.min(u.maxHp,u.hp+2);
        BB_G.step++;bbAiRetryCount=0;
        bbHint('AI治疗了'+target.label);bbUpdUI();bbAutoEnd();
      }else{bbAiRetryCount++;if(bbAiRetryCount<5){setTimeout(function(){bbAiTurn();},200);return;}bbSwTurn();}
    }
    else if(action==='fire_cannon'){
      if(u.type!=='cannon'){bbAiRetryCount++;if(bbAiRetryCount<5){setTimeout(function(){bbAiTurn();},200);return;}bbSwTurn();return;}
      // 检查附近有步兵
      var hasOp2=BB_G.units.some(function(s){return!s.eliminated&&s.team==='blue'&&['soldier','sniper','engineer','doctor'].indexOf(s.type)>=0&&dist(s,u)<BB_CM*3;});
      if(!hasOp2){bbAiRetryCount++;if(bbAiRetryCount<5){setTimeout(function(){bbAiTurn();},200);return;}bbSwTurn();return;}
      var ctx2=args.target_x!==undefined?args.target_x:(BB_G.camps.red?BB_G.camps.red.x:400);
      var cty2=args.target_y!==undefined?args.target_y:(BB_G.camps.red?BB_G.camps.red.y:400);
      var cfg2=BB_CFG.cannon;
      BB_G.step++;
      for(var i2=0;i2<BB_G.units.length;i2++){
        var tu=BB_G.units[i2];
        if(tu.eliminated||tu.team==='blue'||tu.type==='wall'||tu.type==='mine')continue;
        if(cfg2.cantHitAir&&tu.air)continue;
        if(dist(tu,{x:ctx2,y:cty2})<BB_CM)bbDmgU(tu,cfg2.atk,u);
      }
      ['red','blue'].forEach(function(t){
        var c=BB_G.camps[t];if(!c||c.team==='blue'||c.hp<=0)return;
        if(dist(c,{x:ctx2,y:cty2})<BB_CM)bbDmgU(c,cfg2.atk,u);
      });
      BB_G.animExplosions.push({x:ctx2,y:cty2,startTime:Date.now(),radius:30});
      bbAiRetryCount=0;
      bbHint('AI大炮开火！');bbChkOver();bbUpdUI();bbAutoEnd();
    }
    else if(action==='drive'){
      if(['tank','car','heli','jet','bomber','carrier','ship'].indexOf(u.type)<0){bbAiRetryCount++;if(bbAiRetryCount<5){setTimeout(function(){bbAiTurn();},200);return;}bbSwTurn();return;}
      var dx2=args.target_x!==undefined?args.target_x:u.x;
      var dy2=args.target_y!==undefined?args.target_y:u.y;
      // 计算移动距离限制
      var maxDist=BB_CM*2;
      if(u.type==='car'||u.type==='heli')maxDist=BB_CM*3;
      else if(u.type==='jet'||u.type==='bomber')maxDist=BB_CM*4;
      // 限制移动距离
      var mdx=dx2-u.x,mdy=dy2-u.y,mdist=Math.sqrt(mdx*mdx+mdy*mdy);
      if(mdist>maxDist){mdx=mdx/mdist*maxDist;mdy=mdy/mdist*maxDist;}
      var nx2=u.x+mdx,ny2=u.y+mdy;
      nx2=Math.max(BB_UR,Math.min(BB_MS-BB_UR,nx2));
      ny2=Math.max(BB_UR,Math.min(BB_MS-BB_UR,ny2));
      if(!u.air&&!u.sea&&bbIsInSea(nx2,ny2)){
        // 地面单位不能进海，尝试边缘
        nx2=u.x+mdx*0.5;ny2=u.y+mdy*0.5;
        nx2=Math.max(BB_UR,Math.min(BB_MS-BB_UR,nx2));
        ny2=Math.max(BB_UR,Math.min(BB_MS-BB_UR,ny2));
        if(bbIsInSea(nx2,ny2)){bbAiRetryCount++;if(bbAiRetryCount<5){setTimeout(function(){bbAiTurn();},200);return;}bbSwTurn();return;}
      }
      u.x=nx2;u.y=ny2;
      u.facing=Math.atan2(mdy,mdx)+Math.PI/2;
      BB_G.step++;bbAiRetryCount=0;
      bbHint('AI驾驶'+u.label+'移动');bbUpdUI();bbAutoEnd();
    }
    else if(action==='carrier_deploy'){
      if(u.type!=='carrier'){bbAiRetryCount++;if(bbAiRetryCount<5){setTimeout(function(){bbAiTurn();},200);return;}bbSwTurn();return;}
      var dtype=args.deploy_type||'jet';
      var existing=BB_G.units.filter(function(x){return!x.eliminated&&x.team==='blue'&&x.type===dtype&&x._deployedBy===u.id;});
      var maxNum=dtype==='jet'?3:2;
      if(existing.length>=maxNum){bbAiRetryCount++;if(bbAiRetryCount<5){setTimeout(function(){bbAiTurn();},200);return;}bbSwTurn();return;}
      var dnx=u.x+50,dny=u.y;
      if(bbOverlap({x:dnx,y:dny},BB_UR)){dnx=u.x-50;dny=u.y;}
      if(bbOverlap({x:dnx,y:dny},BB_UR)){dnx=u.x;dny=u.y+50;}
      var dnu=bbMakeUnit(dtype,'blue',dnx,dny,0);
      dnu._deployedBy=u.id;
      BB_G.units.push(dnu);BB_G.step++;bbAiRetryCount=0;
      bbHint('AI航母部署'+(dtype==='jet'?'战斗机':'直升机'));bbUpdUI();bbAutoEnd();
    }
    else if(action==='ship_deploy'){
      if(u.type!=='ship'){bbAiRetryCount++;if(bbAiRetryCount<5){setTimeout(function(){bbAiTurn();},200);return;}bbSwTurn();return;}
      var existing2=BB_G.units.filter(function(x){return!x.eliminated&&x.team==='blue'&&x.type==='heli'&&x._deployedBy===u.id;});
      if(existing2.length>=1){bbAiRetryCount++;if(bbAiRetryCount<5){setTimeout(function(){bbAiTurn();},200);return;}bbSwTurn();return;}
      var snx=u.x+50,sny=u.y;
      if(bbOverlap({x:snx,y:sny},BB_UR)){snx=u.x-50;sny=u.y;}
      var snu=bbMakeUnit('heli','blue',snx,sny,0);
      snu._deployedBy=u.id;
      BB_G.units.push(snu);BB_G.step++;bbAiRetryCount=0;
      bbHint('AI战舰部署直升机');bbUpdUI();bbAutoEnd();
    }
    else if(action==='car_mine'){
      if(u.type!=='car'){bbAiRetryCount++;if(bbAiRetryCount<5){setTimeout(function(){bbAiTurn();},200);return;}bbSwTurn();return;}
      var mx2=args.target_x!==undefined?args.target_x:u.x;
      var my2=args.target_y!==undefined?args.target_y:u.y;
      if(dist(u,{x:mx2,y:my2})>BB_CM){
        var ddx2=mx2-u.x,ddy2=my2-u.y,dll2=Math.sqrt(ddx2*ddx2+ddy2*ddy2)||1;
        mx2=u.x+ddx2/dll2*BB_CM*0.8;my2=u.y+ddy2/dll2*BB_CM*0.8;
      }
      var mine=bbMakeUnit('mine','blue',mx2,my2,0);
      BB_G.units.push(mine);BB_G.step++;bbAiRetryCount=0;
      bbHint('AI放置地雷');bbUpdUI();bbAutoEnd();
    }
    else{bbAiRetryCount++;if(bbAiRetryCount<5){setTimeout(function(){bbAiTurn();},200);return;}bbSwTurn();}
  }
  else{bbSwTurn();}
}

function bbDestroy(){
  if(BB_G&&BB_G.animId)cancelAnimationFrame(BB_G.animId);
  BB_G=null;
  document.getElementById('bbUnitPopup').style.display='none';
  document.getElementById('bbCancelBtn').style.display='none';
  document.getElementById('bbAngleKnob').style.display='none';
  document.getElementById('bbMobileFireBtn').style.display='none';
  document.getElementById('bbMobileToolPanel').style.display='none';
}

</script>
</body></html>
